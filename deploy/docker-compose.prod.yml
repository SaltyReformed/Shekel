# Shekel Budget App -- Shared-Mode Compose Override
#
# DEPLOYMENT ROLE
# ---------------
# This file is the version-controlled copy of the production compose
# override that runs on the maintainer's homelab host.  It composes
# WITH the repo's docker-compose.yml -- it does not replace it.
#
# Runtime path:    /opt/docker/shekel/docker-compose.override.yml
# Compose project: shekel-prod (set by the base docker-compose.yml).
#
# Renamed from "docker-compose.override.yml" to "docker-compose.prod.yml"
# so its role is explicit when read in isolation: this is the override
# that distinguishes shared-Nginx production from the bundled-Nginx
# fresh-host bring-up.  In bundled mode this file is NOT used -- the
# repo's docker-compose.yml runs by itself.
#
# WHAT IT CHANGES
# ---------------
# 1. shekel-prod-app joins the dedicated ``shekel-frontend`` bridge
#    (instead of the shared ``homelab`` network) so the app is reachable
#    only by the shared /opt/docker/nginx container and the cloudflared
#    tunnel sidecar -- both attached to ``shekel-frontend`` from
#    /opt/docker/docker-compose.yml.  This isolates the app from
#    co-tenants like jellyfin / immich / unifi that still live on the
#    homelab bridge.  Audit findings F-020, F-129, F-063, Commit C-33.
#
# 2. The bundled shekel-prod-nginx service is parked in the "disabled"
#    profile so ``docker compose up`` does not start it.  The shared
#    /opt/docker/nginx container (defined in /opt/docker/docker-compose.yml)
#    is the only Nginx in this deployment.
#
# 3. Gunicorn's FORWARDED_ALLOW_IPS is repinned from the bundled
#    default (the ``backend`` bridge) to the ``shekel-frontend`` bridge
#    that actually carries the proxy hop in shared mode.
#    See the gunicorn.conf.py block-comment for the full rationale.
#
# OPERATOR PRE-FLIGHT (one-time, when first switching to shared mode)
# -------------------------------------------------------------------
# 1. Create the shekel-frontend network on the host with a pinned subnet:
#
#        docker network create shekel-frontend \
#            --driver bridge \
#            --subnet 172.32.0.0/24
#
#    The subnet matches FORWARDED_ALLOW_IPS below and the
#    ``set_real_ip_from`` directive in deploy/nginx-shared/nginx.conf.
#
# 2. Edit /opt/docker/docker-compose.yml so the ``nginx`` and
#    ``cloudflared`` services join shekel-frontend in addition to the
#    homelab network they already use:
#
#        services:
#          nginx:
#            networks:
#              - homelab
#              - shekel-frontend
#          cloudflared:
#            networks:
#              - homelab
#              - shekel-frontend
#        networks:
#          shekel-frontend:
#            external: true
#
#    Recreate the affected containers:
#
#        cd /opt/docker
#        docker compose up -d nginx cloudflared
#
# 3. Update /opt/docker/cloudflared/config.yml so the shekel ingress
#    rule points to the shared Nginx instead of straight at gunicorn:
#
#        - hostname: shekel.saltyreformed.com
#          service: http://nginx:80
#
#    Restart cloudflared:
#
#        cd /opt/docker
#        docker compose up -d cloudflared
#
# Without these three steps the WAN path will 404 and Gunicorn will
# refuse start (FORWARDED_ALLOW_IPS without a matching reverse-proxy
# source = no trusted forwarded headers).  See docs/runbook.md "Shared-
# mode deployment" for the rollback procedure.
#
# USAGE
# -----
# On the host:
#   cd /opt/shekel
#   docker compose \
#     -f docker-compose.yml \
#     -f deploy/docker-compose.prod.yml \
#     up -d
#
# Or with the runtime override copy in /opt/docker/shekel/, where compose
# auto-loads docker-compose.override.yml:
#   cd /opt/docker/shekel
#   docker compose up -d
#
# Either invocation must produce the same merged config.  See
# docs/runbook.md "Shared-mode deployment" for the sync procedure that
# keeps the on-host override in step with this file.
#
# CONTAINER HARDENING INHERITANCE (Commit C-35)
# ---------------------------------------------
# This override does NOT redeclare the ``security_opt``,
# ``cap_drop``, ``read_only``, ``tmpfs``, ``mem_limit``,
# ``pids_limit``, ``logging``, or ``user`` settings from the base
# docker-compose.yml.  Compose merges per-key by default for those
# scalars; the only keys this file overrides are ``image`` (pin to
# digest), ``environment.*`` (FORWARDED_ALLOW_IPS), ``networks``
# (replaces the list), and ``profiles`` (adds disabled to nginx).
# Every hardening field on the app and db services flows through
# to the shared-mode runtime unchanged.  Verified by ``docker
# compose -f docker-compose.yml -f deploy/docker-compose.prod.yml
# config`` and by the test suite under
# tests/test_deploy/test_container_hardening.py.
#
# IMAGE DIGEST PINNING (Commit C-36 / audit findings F-060, F-155)
# ----------------------------------------------------------------
# Shared-mode production replaces the base file's ``:latest`` tag
# with an immutable ``@sha256:<digest>`` reference, sourced from
# the host ``.env`` via the ``SHEKEL_IMAGE_DIGEST`` interpolation
# below.  The ``:?`` syntax FAILS the compose parse loudly if the
# variable is missing or empty: that is intentional -- a missing
# digest in production would silently fall back to whatever
# ``:latest`` resolved to at the time of pull, defeating both the
# audit fix and any downstream Cosign verification.
#
# Operator workflow:
#   1. After CI (or scripts/deploy.sh in local-build mode) builds
#      and signs a new image, capture the digest the build emits.
#      For CI builds the digest is in the ``Build & Publish Docker
#      Image`` workflow's "Image digest" step output; for local
#      builds, scripts/deploy.sh prints the digest after a
#      successful ``cosign sign``.
#   2. On the host, edit /opt/docker/shekel/.env and set:
#        SHEKEL_IMAGE_DIGEST=sha256:abc123...
#      (the value INCLUDES the ``sha256:`` prefix; the ``image:``
#      line below already supplies the ``@`` separator).
#   3. Re-run ``docker compose -f docker-compose.yml -f
#      docker-compose.override.yml up -d`` to roll the app
#      container to the new digest.
#   4. Verify the running image via ``docker inspect
#      shekel-prod-app --format '{{.Image}}'`` -- the output digest
#      must match the value pinned in .env.
#
# See deploy/README.md "Image digest pinning" for the full
# rotation procedure including Cosign verify and rollback.

services:
  app:
    # Pin to an immutable digest sourced from .env.  ``${VAR:?...}``
    # makes the missing-variable case a hard parse failure with a
    # clear remediation message, matching the rest of the compose
    # stack's required-secret handling (SECRET_KEY, POSTGRES_PASSWORD,
    # APP_ROLE_PASSWORD).  Audit findings F-060, F-155 / Commit C-36.
    image: ghcr.io/saltyreformed/shekel@${SHEKEL_IMAGE_DIGEST:?Set SHEKEL_IMAGE_DIGEST=sha256:... in /opt/docker/shekel/.env to pin the production image (audit finding F-060). See deploy/README.md "Image digest pinning" for the procedure.}
    environment:
      # Shared mode: the in-stack ``backend`` bridge no longer carries
      # the reverse-proxy hop -- the shared /opt/docker/nginx talks to
      # the app over ``shekel-frontend``.  Override the bundled-mode
      # default with the shared subnet so Gunicorn keeps refusing
      # X-Forwarded-* from any source other than the shared nginx /
      # cloudflared sidecar.  Audit finding F-015, Commit C-33.
      FORWARDED_ALLOW_IPS: 172.32.0.0/24
    networks:
      - backend
      - shekel-frontend

  nginx:
    profiles: ["disabled"]

networks:
  # External pre-existing bridge that hosts the shared /opt/docker/nginx
  # container, the cloudflared tunnel sidecar, and the shekel app.
  # Nothing else -- co-tenants like jellyfin/immich/unifi stay on the
  # homelab bridge.  Audit findings F-020, F-129, Commit C-33.
  #
  # The operator must create this network manually before the first
  # ``docker compose up`` (see "OPERATOR PRE-FLIGHT" above):
  #
  #     docker network create shekel-frontend \
  #         --driver bridge \
  #         --subnet 172.32.0.0/24
  #
  # ``external: true`` declares that compose does NOT manage the
  # network; ``name: shekel-frontend`` strips the project prefix so it
  # matches the literal name the host-level compose attaches to.
  shekel-frontend:
    external: true
    name: shekel-frontend
