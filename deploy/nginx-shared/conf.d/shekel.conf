# Shekel Budget App -- Shared-Mode Vhost
#
# DEPLOYMENT ROLE
# ---------------
# Per-service server block included by deploy/nginx-shared/nginx.conf
# (which mirrors /opt/docker/nginx/nginx.conf on the host) via
# `include /etc/nginx/conf.d/*.conf`.
#
# Runtime path:    /opt/docker/nginx/conf.d/shekel.conf
# Mount source:    deploy/nginx-shared/conf.d/shekel.conf
#
# LAN clients reach this via the OPNsense DNS override for
# shekel.saltyreformed.com, which resolves to this machine's LAN IP.
# WAN clients reach the same hostname via the Cloudflare Tunnel
# configured in cloudflared/config.yml.

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name shekel.saltyreformed.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name shekel.saltyreformed.com;

    # Let's Encrypt certificates
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Shekel is a budget app with no large uploads.
    client_max_body_size 5M;

    # ── Security Headers ──────────────────────────────────────────
    # Defense-in-depth headers emitted by Nginx so they are present
    # on responses Flask never produces (e.g. an Nginx 502 when the
    # app is restarting, an SSL handshake failure, or any error page
    # served before the request reaches Gunicorn).  Flask's
    # after_request hook (``app/__init__.py:782``, set by Commit
    # C-02) emits the same values plus HSTS / CSP / Cache-Control on
    # dynamic responses; the duplication is the point of defense-in-
    # depth.
    #
    # The ``always`` flag emits the header even on 4xx/5xx responses
    # where Nginx's default ``add_header`` would suppress it.  The
    # sibling ``jellyfin.conf`` on this same shared Nginx already
    # applies the same pattern; matching it closes the
    # service-by-service drift the audit flagged.  Audit findings
    # F-064 and F-156, Commit C-33.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        # 'shekel-prod-app' resolves via Docker DNS to the shekel app
        # container on the pinned ``shekel-frontend`` bridge
        # (172.32.0.0/24).  Audit findings F-020/F-129 moved the app
        # off the shared ``homelab`` network so co-tenants like
        # jellyfin/immich/unifi cannot reach Gunicorn directly; this
        # Nginx is now the only legitimate caller of port 8000.
        # Gunicorn listens on port 8000.  Variable in proxy_pass
        # forces runtime re-resolution (see resolver directive in
        # nginx.conf).
        set $upstream_shekel shekel-prod-app:8000;
        proxy_pass http://$upstream_shekel;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;

        # Repeat the security headers inside the location block.
        # Nginx's ``add_header`` directive does NOT inherit from a
        # parent context once the child context declares any
        # ``add_header`` of its own.  No location-level add_header
        # is currently set here, so the parent inheritance applies,
        # but listing them explicitly makes future drift impossible:
        # a future operator adding (e.g.) a Cache-Control override
        # in this block would silently drop the security headers
        # without these copies.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }
}
