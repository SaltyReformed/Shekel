# Shekel Budget App -- Shared Homelab Nginx Reverse Proxy Configuration
#
# DEPLOYMENT ROLE
# ---------------
# This file is the version-controlled copy of the Nginx main config that
# runs on the maintainer's homelab production host as the SHARED reverse
# proxy in front of multiple services (Shekel, Jellyfin, Unifi, etc.).
#
# Runtime path:    /opt/docker/nginx/nginx.conf
# Container:       nginx (image: nginx:latest), defined in
#                  /opt/docker/docker-compose.yml on the host.
# Companion vhost: deploy/nginx-shared/conf.d/shekel.conf, included via
#                  the trailing `include /etc/nginx/conf.d/*.conf` below.
#
# This is NOT the file mounted into the bundled shekel-prod-nginx
# service.  The bundled equivalent lives at deploy/nginx-bundled/nginx.conf
# and is the only path used when shekel runs as a self-contained stack.
# In shared mode, deploy/docker-compose.prod.yml parks the bundled
# nginx service in the "disabled" profile and joins the app container
# to the external `homelab` network so the shared Nginx can reach it.
#
# SYNC PROCEDURE
# --------------
# This file is the source of truth.  To roll out a change:
#   1. Edit this file in the repo and commit on the dev branch.
#   2. On the host:
#        cd /opt/docker/nginx
#        # Replace the on-host file with the repo copy.
#        sudo cp /opt/shekel/deploy/nginx-shared/nginx.conf nginx.conf
#        sudo cp /opt/shekel/deploy/nginx-shared/conf.d/shekel.conf conf.d/shekel.conf
#        # Validate before reloading.
#        sudo docker exec nginx nginx -t
#        # Reload without dropping connections.
#        sudo docker exec nginx nginx -s reload
#   3. See docs/runbook.md "Updating shared Nginx configuration" for
#      the full sync procedure including the rollback steps.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Do not reveal Nginx version in headers
    server_tokens off;

    # ── Global request hardening (Audit B7) ───────────────────────
    # Cap how long slow clients can hold a connection open.  30 s on
    # all three is generous for legitimate clients (cellular networks,
    # large form uploads) while shutting down Slowloris-style probes.
    # client_max_body_size 1m is the global default; per-vhost server
    # blocks override this where larger bodies are legitimate (e.g.
    # immich image upload, calibre-web book ingest).
    client_body_timeout    30s;
    client_header_timeout  30s;
    send_timeout           30s;
    client_max_body_size   1m;

    # ── Per-IP rate limiting (Audit B7) ───────────────────────────
    # ``zone=public`` is referenced by the public-facing vhosts in
    # /opt/docker/nginx/conf.d/ (jellyfin, immich, calibre-web, ntfy,
    # and shekel) via ``limit_req zone=public burst=100 nodelay;``.
    # The 10 MiB zone holds ~160 k IPs of state; 60 r/s with a burst-
    # of-100 absorbs legitimate page-load spikes (dozens of static
    # assets) without pacing real users.  After Audit H-002,
    # ``$binary_remote_addr`` is the real client IP via the
    # ``set_real_ip_from`` block below.
    limit_req_zone $binary_remote_addr zone=public:10m rate=60r/s;

    # WebSocket upgrade mapping
    # If the client sends an Upgrade header, $connection_upgrade becomes
    # "upgrade". Otherwise it becomes "close". This is the standard way
    # to handle WebSocket proxying in Nginx.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Use Docker's embedded DNS so upstreams are re-resolved at runtime
    # (instead of cached once at config load). Without this, a container
    # restart that changes its IP causes 502s until nginx is reloaded.
    # Paired with `set $upstream_x ...; proxy_pass http://$upstream_x;`
    # in each server block to force per-request resolution.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Real IP from Cloudflare Tunnel ────────────────────────────
    # The shared Nginx is the single chokepoint for both LAN and WAN
    # Shekel traffic.  WAN traffic enters via the cloudflared sidecar
    # and arrives at this Nginx over a pinned bridge.  We trust ONLY
    # the bridges where cloudflared actually lives so a co-tenant on
    # an unrelated network cannot inject a forged client IP.  Audit
    # findings F-015, F-063 / H-002 (Commits C-33 / C-39).
    #
    # Two CIDRs during the shekel-frontend migration:
    #   172.18.255.10/32 -- cloudflared's pinned IP on the homelab
    #                       bridge (current, pre-migration).  /32
    #                       narrows trust to that exact host so other
    #                       homelab co-tenants (jellyfin, immich,
    #                       unifi, calibre-web) cannot forge
    #                       CF-Connecting-IP.  See cloudflared's
    #                       ``ipv4_address`` pin in /opt/docker/
    #                       docker-compose.yml.
    #   172.32.0.0/24    -- shekel-frontend bridge (target).  Once
    #                       cloudflared is attached to shekel-frontend
    #                       and stops appearing on homelab, the
    #                       /32 above can be removed.
    #
    # ``real_ip_recursive off`` keeps Nginx from walking a chain of
    # forwarded values: CF-Connecting-IP is always a single client
    # IP, so any chain implies an injection attempt.
    set_real_ip_from 172.18.255.10/32;
    set_real_ip_from 172.32.0.0/24;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive off;

    # Include per-service server blocks
    include /etc/nginx/conf.d/*.conf;
}
