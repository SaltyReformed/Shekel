# Shekel Budget App -- Shared Homelab Nginx Reverse Proxy Configuration
#
# DEPLOYMENT ROLE
# ---------------
# This file is the version-controlled copy of the Nginx main config that
# runs on the maintainer's homelab production host as the SHARED reverse
# proxy in front of multiple services (Shekel, Jellyfin, Unifi, etc.).
#
# Runtime path:    /opt/docker/nginx/nginx.conf
# Container:       nginx (image: nginx:latest), defined in
#                  /opt/docker/docker-compose.yml on the host.
# Companion vhost: deploy/nginx-shared/conf.d/shekel.conf, included via
#                  the trailing `include /etc/nginx/conf.d/*.conf` below.
#
# This is NOT the file mounted into the bundled shekel-prod-nginx
# service.  The bundled equivalent lives at deploy/nginx-bundled/nginx.conf
# and is the only path used when shekel runs as a self-contained stack.
# In shared mode, deploy/docker-compose.prod.yml parks the bundled
# nginx service in the "disabled" profile and joins the app container
# to the external `homelab` network so the shared Nginx can reach it.
#
# SYNC PROCEDURE
# --------------
# This file is the source of truth.  To roll out a change:
#   1. Edit this file in the repo and commit on the dev branch.
#   2. On the host:
#        cd /opt/docker/nginx
#        # Replace the on-host file with the repo copy.
#        sudo cp /opt/shekel/deploy/nginx-shared/nginx.conf nginx.conf
#        sudo cp /opt/shekel/deploy/nginx-shared/conf.d/shekel.conf conf.d/shekel.conf
#        # Validate before reloading.
#        sudo docker exec nginx nginx -t
#        # Reload without dropping connections.
#        sudo docker exec nginx nginx -s reload
#   3. See docs/runbook.md "Updating shared Nginx configuration" for
#      the full sync procedure including the rollback steps.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Do not reveal Nginx version in headers
    server_tokens off;

    # WebSocket upgrade mapping
    # If the client sends an Upgrade header, $connection_upgrade becomes
    # "upgrade". Otherwise it becomes "close". This is the standard way
    # to handle WebSocket proxying in Nginx.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Use Docker's embedded DNS so upstreams are re-resolved at runtime
    # (instead of cached once at config load). Without this, a container
    # restart that changes its IP causes 502s until nginx is reloaded.
    # Paired with `set $upstream_x ...; proxy_pass http://$upstream_x;`
    # in each server block to force per-request resolution.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Real IP from Cloudflare Tunnel ────────────────────────────
    # The shared Nginx is the single chokepoint for both LAN and WAN
    # Shekel traffic.  WAN traffic enters via the cloudflared sidecar
    # and arrives at this Nginx over the pinned ``shekel-frontend``
    # bridge (172.32.0.0/24) -- the network owned by shekel's compose
    # project that also hosts the app and the cloudflared container.
    # We trust ONLY that subnet for the CF-Connecting-IP header so
    # a co-tenant on the unrelated ``homelab`` bridge cannot inject
    # a forged client IP.  Audit findings F-015 and F-063, Commit C-33.
    #
    # ``real_ip_recursive off`` keeps Nginx from walking a chain of
    # forwarded values: CF-Connecting-IP is always a single client
    # IP, so any chain implies an injection attempt.
    set_real_ip_from 172.32.0.0/24;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive off;

    # Include per-service server blocks
    include /etc/nginx/conf.d/*.conf;
}
