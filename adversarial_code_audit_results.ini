  Finding 2.8: No Negative Amount Validation on Transactions

  Category: Domain Invariant
  Risk Level: Medium
  Files: app/schemas/validation.py — TransactionCreateSchema, InlineTransactionCreateSchema

  Why this is a problem: No schema or DB constraint prevents estimated_amount = -500. A negative expense would be treated as income by the balance calculator, silently corrupting
  projections.

  Concrete failure scenario: User enters -200 for an expense. The balance calculator subtracts a negative, effectively adding 200 to the balance. Projections are wrong.

  Minimal fix:
  # In TransactionCreateSchema / InlineTransactionCreateSchema:
  estimated_amount = fields.Decimal(places=2, required=True, validate=validate.Range(min=0))

  Also add a CHECK constraint:
  ALTER TABLE budget.transactions ADD CONSTRAINT ck_transactions_positive_amount
      CHECK (estimated_amount >= 0);

