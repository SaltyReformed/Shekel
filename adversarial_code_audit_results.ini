  5. Financial Logic Audit

  Decimal Usage

  All monetary values use Decimal throughout. No float arithmetic found anywhere in the codebase. This is correct.

  Rounding Policy

  Consistent ROUND_HALF_UP with quantize(Decimal("0.01")) across all tax and paycheck calculations. The _apply_single_raise function does NOT quantize intermediate results (line 245: salary
   * (1 + pct)) — this is correct because the final result is quantized at line 238.

  Tax Edge Cases

  1. State tax uses wrong base: paycheck_calculator.py:128-129 computes state tax on taxable_biweekly * pay_periods_per_year which is gross minus pre-tax deductions. Many states have their
  own rules about what's deductible. For NC flat tax, this is approximately correct but not IRS-precise.
  2. FICA cumulative wages recalculated from scratch each period: _get_cumulative_wages (line 384) iterates all prior periods and re-applies raises for each one. For a projection with 52
  periods, this is O(n^2) raise applications. Functionally correct but slow.
  3. Third paycheck detection is year-unaware for deduction caps: The annual cap column on PaycheckDeduction exists but _calculate_deductions never checks it. A 401k deduction at
  $961.54/paycheck x 26 = $25,000 would exceed the 2026 IRS limit of $23,500.
  4. Deduction inflation compounds annually but doesn't reset: _inflation_years computes years since profile creation. If a deduction's inflation starts in month 6 but the profile was
  created in month 1, the inflation starts immediately, not at month 6.

  Suggested Property-Based Tests

  from hypothesis import given, strategies as st

  @given(gross=st.decimals(min_value=0, max_value=1_000_000, places=2))
  def test_net_pay_never_exceeds_gross(gross):
      """Net pay after all deductions/taxes should never exceed gross."""
      # Setup profile with gross, verify breakdown.net_pay <= breakdown.gross_biweekly

  @given(salary=st.decimals(min_value=1, max_value=10_000_000, places=2))
  def test_federal_withholding_monotonically_increases(salary):
      """Higher income should never produce lower withholding (same brackets)."""

  @given(children=st.integers(min_value=0, max_value=20))
  def test_credits_cannot_produce_negative_withholding(children):
      """Regardless of credit count, withholding is >= 0."""

