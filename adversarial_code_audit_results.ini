  Finding 2.6: _get_existing_map Includes Deleted Transactions

  Category: Data Integrity
  Risk Level: High
  Files: app/services/recurrence_engine.py:406-424

  Why this is a problem: Despite the docstring saying "Only fetches non-deleted entries," the query has no is_deleted == False filter. The dict comprehension {txn.pay_period_id: txn for txn
   in existing} means if both a deleted and non-deleted transaction exist for the same period, only one survives (last write wins). The generate_for_template method then finds an existing
  entry and skips generation, even though the visible entry is deleted.

  Concrete failure scenario: User soft-deletes a template transaction. On next generation, _get_existing_map returns the deleted transaction. generate_for_template sees it as
  is_deleted=True and skips (line 104). No new transaction is created. The period appears empty.

  Wait — re-reading the code, line 104 continue means it does skip deleted entries correctly. But the map could still overwrite a non-deleted entry with a deleted one if both exist. The
  real issue is the docstring is wrong, and the behavior actually works because lines 96-108 handle every case with continue. However, this is fragile — if a period has both a deleted and
  non-deleted entry, the map only retains one.

  Minimal fix: Add the filter for correctness and to match the docstring:
  .filter(
      Transaction.template_id == template_id,
      Transaction.scenario_id == scenario_id,
      Transaction.pay_period_id.in_(period_ids),
      Transaction.is_deleted.is_(False),
  )

  Actually, the current code needs deleted entries to avoid re-creating them (the is_deleted check on line 104 explicitly skips). So the docstring is wrong but the behavior is intentional.
  The real fix is: change from a dict to a list-of-dicts keyed by period, so multiple entries per period are visible:

  # Return {period_id: [Transaction, ...]} to handle multiple entries
  from collections import defaultdict
  result = defaultdict(list)
  for txn in existing:
      result[txn.pay_period_id].append(txn)
  return result

  Suggested test:
  def test_soft_deleted_entry_prevents_regeneration():
      # Soft-delete a template txn, then generate → should not re-create

