  9. Quick Wins (Low Effort / High Impact)

  1. Add ownership check helper for transactions (~15 lines). Prevents the critical authorization bypass across 10+ routes. Single function, applied to each route.
  2. Wrap Decimal() calls in try/except in mark_done and settings (~10 lines each). Prevents 500 errors from malformed user input.
  3. Add validate.Range(min=0) to estimated_amount in transaction schemas (~1 line per schema). Prevents negative amounts corrupting balance projections.
  4. Add hx-disabled-elt="this" to all HTMX submit buttons (~1 attribute per form). Prevents the most common double-submit scenarios with zero backend changes.
  5. Stop swallowing Exception in _regenerate_salary_transactions — catch RecurrenceConflict specifically, let others propagate (~3 line change). Prevents silent data corruption.
  6. Add CHECK (estimated_amount >= 0) constraint on transactions table (~1 migration). Database-level enforcement of positive amounts.
  7. Add is_deleted.is_(False) filter to _get_existing_map query and handle deleted entries separately (~2 lines). Makes the query match its documented intent.
  8. Log user_id in all route-level transaction/salary logs (~1 variable added per log call). Critical for debugging in any multi-session scenario.
  9. Add test for recurring raise compounding (~20 lines). Validates or disproves the double-application bug documented in Finding 2.5.
  10. Add UNIQUE(user_id, is_baseline) WHERE is_baseline = TRUE partial index on scenarios (~1 migration line). Enforces the single-baseline invariant at the database level.