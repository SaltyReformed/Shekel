  Finding 2.4: Carry-Forward Missing Scenario Filter

  Category: Domain Invariant
  Risk Level: Medium
  Files: app/services/carry_forward_service.py (implied from app/routes/transactions.py:371-387)

  Why this is a problem: carry_forward_unpaid moves all projected transactions from the source period to the target, regardless of scenario. When scenarios are implemented, this would move
  transactions from non-baseline scenarios too.

  Concrete failure scenario: (Future) User has baseline + "what-if" scenario. Carry-forward moves both scenarios' projected items to the current period, corrupting the what-if scenario.

  Minimal fix: Add scenario_id parameter to carry_forward_unpaid() and filter the query.

