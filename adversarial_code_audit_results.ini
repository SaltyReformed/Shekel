  Finding 2.2: Unvalidated Decimal Parsing in mark_done and settings

  Category: Error Handling
  Risk Level: Critical
  Files: app/routes/transactions.py:129, app/routes/settings.py:46-57

  Why this is a problem: Decimal(actual) with user-supplied string will throw InvalidOperation on inputs like "abc", "", or "--". Similarly, int(grid_periods) will throw ValueError. These
  uncaught exceptions return 500 errors.

  Concrete failure scenario: User submits actual_amount=abc via the mark-done form. Flask returns a 500 internal server error.

  Minimal fix:
  # transactions.py:127-129
  actual = request.form.get("actual_amount")
  if actual:
      try:
          txn.actual_amount = Decimal(actual).quantize(TWO_PLACES)
      except (InvalidOperation, ValueError):
          return "Invalid amount", 400

  # settings.py — use schema validation or wrap in try/except
  try:
      settings.grid_default_periods = int(grid_periods)
  except (ValueError, TypeError):
      flash("Invalid number of periods.", "danger")
      return redirect(url_for("settings.show"))

  Suggested test:
  def test_mark_done_rejects_invalid_amount(auth_client, txn_id):
      resp = auth_client.post(f"/transactions/{txn_id}/mark-done", data={"actual_amount": "abc"})
      assert resp.status_code == 400

