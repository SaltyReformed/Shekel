  7. Test Suite Gaps

  Untested High-Risk Logic

  1. No authorization tests: No test verifies that User B cannot access User A's transactions, profiles, or accounts
  2. No salary route tests at all: The entire salary module (CRUD, raises, deductions, projection) has zero route tests
  3. No paycheck calculator integration tests: Pure function is tested via tax_calculator, but calculate_paycheck and project_salary have no tests
  4. No settings route tests: Raw int()/Decimal() parsing untested
  5. No template update/regeneration tests: The template update → regeneration → conflict flow is untested at the route level
  6. Calendar-based recurrence patterns untested: monthly, quarterly, semi_annual, annual patterns have no tests

  Tests That Only Validate Happy Paths

  - test_routes/test_grid.py: All 8 tests are happy paths. No error states, no authorization, no malformed input
  - test_routes/test_auth.py: Only 1 sad path (wrong password). Missing: locked account, invalid email format, CSRF

