  Finding 2.7: Grid Performance — Loading All Transactions

  Category: Performance
  Risk Level: Medium
  Files: app/routes/grid.py:78-90

  Why this is a problem: The grid loads ALL periods via get_all_periods() and then ALL transactions across ALL periods. With 52+ periods and hundreds of transactions, this becomes
  expensive. The balance calculation needs the full history, but transaction display only needs the visible window.

  Concrete failure scenario: After 2 years (104+ periods with ~10 transactions each), the grid loads 1000+ transaction objects on every page view.

  Minimal fix: Split the query — load full history for balance calc but only visible period transactions for display:
  # For balance calc — lightweight aggregate or cached
  # For display — only visible periods
  visible_period_ids = [p.id for p in periods]
  visible_txns = Transaction.query.filter(
      Transaction.pay_period_id.in_(visible_period_ids), ...
  ).all()

