  2. Detailed Findings

  Finding 2.1: Missing Ownership Checks on Transaction Routes

  Category: Security — Authorization
  Risk Level: Critical
  Files: app/routes/transactions.py:42-47, 71-104, 107-135, 138-150, 153-165, 168-183, 284-324, 327-348, 351-368

  Why this is a problem: Routes like update_transaction, mark_done, mark_credit, cancel_transaction, delete_transaction, get_cell, get_quick_edit, get_full_edit all fetch transactions by ID
   without verifying transaction.pay_period.user_id == current_user.id. Any authenticated user who guesses or enumerates transaction IDs can read, modify, or delete another user's data.

  Concrete failure scenario: User A creates a transaction (id=42). User B sends PATCH /transactions/42 with estimated_amount=0.01. The route updates it without checking ownership.

  Minimal fix: Add an ownership helper and call it in every transaction route:

  def _get_owned_transaction(txn_id):
      txn = db.session.get(Transaction, txn_id)
      if txn is None or txn.pay_period.user_id != current_user.id:
          return None
      return txn

  Suggested test:
  def test_cannot_update_other_users_transaction(auth_client, seed_user):
      # Create txn as user A, then attempt PATCH as user B → 404

