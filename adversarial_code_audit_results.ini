  Finding 2.3: Silent Exception Swallowing in _regenerate_salary_transactions

  Category: Error Handling / Data Integrity
  Risk Level: High
  Files: app/routes/salary.py:653-659

  Why this is a problem: The except Exception catches everything — IntegrityError, TypeError, KeyError, database connection errors — and logs only a warning. The route then continues to
  commit(), persisting a partially-mutated state where the profile was updated but transactions are stale or missing.

  Concrete failure scenario: User updates annual salary. The regeneration fails due to a missing tax bracket set (raises TypeError in paycheck calculator). The profile is committed with the
   new salary, but all projected transactions still reflect the old net pay amount. The user sees inconsistent data.

  Minimal fix:
  try:
      recurrence_engine.regenerate_for_template(...)
  except RecurrenceConflict as e:
      logger.warning("Recurrence conflict: %s", e)
  except Exception:
      logger.exception("Failed to regenerate salary transactions for profile %d", profile.id)
      db.session.rollback()
      raise  # Or flash error and redirect

  Suggested test:
  def test_regeneration_failure_rolls_back_profile_update(auth_client, profile_id, monkeypatch):
      monkeypatch.setattr(recurrence_engine, "regenerate_for_template", side_effect=TypeError)
      # POST update → profile should NOT be updated

