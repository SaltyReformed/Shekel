  8. Idempotency & Double-Submission Risks

  Vulnerable Routes

  ┌─────────────────────────────────────┬────────┬─────────────────────────────────────────────────────────────────────────┬──────────┐
  │                Route                │ Method │                          Double-Submit Effect                           │ Severity │
  ├─────────────────────────────────────┼────────┼─────────────────────────────────────────────────────────────────────────┼──────────┤
  │ POST /transactions/inline           │ POST   │ Creates duplicate transaction                                           │ High     │
  ├─────────────────────────────────────┼────────┼─────────────────────────────────────────────────────────────────────────┼──────────┤
  │ POST /transactions                  │ POST   │ Creates duplicate transaction                                           │ High     │
  ├─────────────────────────────────────┼────────┼─────────────────────────────────────────────────────────────────────────┼──────────┤
  │ POST /salary                        │ POST   │ Creates duplicate profile + template + rule + transactions              │ High     │
  ├─────────────────────────────────────┼────────┼─────────────────────────────────────────────────────────────────────────┼──────────┤
  │ POST /salary/<id>/raises            │ POST   │ Creates duplicate raise                                                 │ Medium   │
  ├─────────────────────────────────────┼────────┼─────────────────────────────────────────────────────────────────────────┼──────────┤
  │ POST /salary/<id>/deductions        │ POST   │ Creates duplicate deduction                                             │ Medium   │
  ├─────────────────────────────────────┼────────┼─────────────────────────────────────────────────────────────────────────┼──────────┤
  │ POST /categories                    │ POST   │ Caught by duplicate check in route                                      │ Safe     │
  ├─────────────────────────────────────┼────────┼─────────────────────────────────────────────────────────────────────────┼──────────┤
  │ POST /pay-periods/generate          │ POST   │ Creates overlapping periods (caught by unique constraint on start_date) │ Low      │
  ├─────────────────────────────────────┼────────┼─────────────────────────────────────────────────────────────────────────┼──────────┤
  │ POST /transactions/<id>/mark-done   │ POST   │ Idempotent (sets same status)                                           │ Safe     │
  ├─────────────────────────────────────┼────────┼─────────────────────────────────────────────────────────────────────────┼──────────┤
  │ POST /transactions/<id>/mark-credit │ POST   │ Creates duplicate payback                                               │ High     │
  └─────────────────────────────────────┴────────┴─────────────────────────────────────────────────────────────────────────┴──────────┘

  Proposed Safeguards

  1. Transaction creation: Add a composite unique index:
  CREATE UNIQUE INDEX uq_transactions_adhoc_dedup
  ON budget.transactions (name, pay_period_id, scenario_id, estimated_amount)
  WHERE template_id IS NULL AND is_deleted = FALSE;

  2. Mark-as-credit double-submit: Check if already credited before creating payback:
  # credit_workflow.py:56, after setting credit status
  if txn.status.name == "credit":
      existing_payback = db.session.query(Transaction).filter_by(
          credit_payback_for_id=txn.id
      ).first()
      if existing_payback:
          return existing_payback  # Already processed

  3. Salary profile creation: Add a PRG (Post-Redirect-Get) pattern — already redirects, but add a flash-based guard or check for existing profile with same name before creation.
  4. HTMX-level guard: Add hx-disable attribute to submit buttons that disables on click:
  <button hx-post="..." hx-disabled-elt="this">Save</button>

