  Finding 2.5: Recurring Raise Double-Application Bug

  Category: Financial Correctness
  Risk Level: Medium
  Files: app/services/paycheck_calculator.py:216-228

  Why this is a problem: For a recurring raise with eff_year set and period_month >= eff_month, the code first applies the raise once (line 221), then computes years_passed and applies it
  again for each prior year (lines 223-228). This means for period_year == eff_year and period_month >= eff_month, the raise is applied once correctly. But for period_year > eff_year, the
  raise is applied 1 + years_passed times total — one extra application.

  Concrete failure scenario: Raise is 3% recurring, set for March 2026. In March 2027, the code applies it once for "month reached" (line 221), then years_passed = 1, so it applies again in
   the loop. Total: compounded twice in year 1, when it should only compound once for each year elapsed (total once by March 2027).

  Minimal fix: Restructure to count total applications first, then apply:
  if raise_obj.is_recurring:
      if eff_year is None:
          continue
      total_applications = period_year - eff_year
      if period_month < eff_month:
          total_applications -= 1
      for _ in range(max(0, total_applications)):
          salary = _apply_single_raise(salary, raise_obj)

  Suggested test:
  def test_recurring_raise_not_double_applied():
      # 3% raise in March 2026, check salary in April 2027
      # Should be base * 1.03, not base * 1.03 * 1.03

