{# Reusable confirmation modal — replaces browser confirm() dialogs.

   Usage on any form:
     <form method="POST" action="..." data-confirm="Are you sure?">
       <button type="submit">Delete</button>
     </form>

   The JS in app.js intercepts submit, shows this modal, and only submits on confirm.
#}
<div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="confirmModalLabel">Confirm</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="confirmModalBody">
        Are you sure?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmModalYes">Confirm</button>
      </div>
    </div>
  </div>
</div>
