{% extends "base.html" %}
{% block title %}Register - Shekel{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4 col-lg-3">
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="text-center mb-4">
          <img src="{{ url_for('static', filename='img/shekel_logo.png') }}" alt="Shekel" height="40" class="logo-img">
        </div>
        <form method="POST" action="{{ url_for('auth.register') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email"
                   required autocomplete="email"
                   value="{{ request.form.get('email', '') }}">
          </div>
          <div class="mb-3">
            <label for="display_name" class="form-label">Display Name</label>
            <input type="text" class="form-control" id="display_name" name="display_name"
                   required maxlength="100"
                   value="{{ request.form.get('display_name', '') }}">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   required minlength="12" autocomplete="new-password">
            <div class="form-text">Minimum 12 characters.</div>
          </div>
          <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                   required minlength="12" autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary w-100">Create Account</button>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('auth.login') }}">Already have an account? Sign in</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
