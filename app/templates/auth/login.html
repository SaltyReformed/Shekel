{% extends "base.html" %}
{% block title %}Login -- Shekel{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4 col-lg-3">
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="text-center mb-4">
          <img src="{{ url_for('static', filename='img/shekel_logo.png') }}" alt="Shekel" height="40" style="width: auto;">
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email"
                   required autofocus placeholder="admin@shekel.local"
                   autocomplete="email">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   required autocomplete="current-password">
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="remember" name="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
        {% if config.REGISTRATION_ENABLED %}
        <div class="text-center mt-3">
          <a href="{{ url_for('auth.register_form') }}">Create an account</a>
        </div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
