{% extends "base.html" %}
{% block title %}Disable Two-Factor Authentication -- Shekel{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card border-danger shadow-sm">
      <div class="card-body">
        <h5 class="card-title mb-3">
          <i class="bi bi-shield-x text-danger"></i> Disable Two-Factor Authentication
        </h5>

        <p class="text-muted">
          Enter your current password and a code from your authenticator app to confirm.
        </p>

        <form method="POST" action="{{ url_for('auth.mfa_disable_confirm') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="current_password" class="form-label">Current Password</label>
            <input type="password" class="form-control" id="current_password"
                   name="current_password" required>
          </div>
          <div class="mb-3">
            <label for="totp_code" class="form-label">Authentication Code</label>
            <input type="text" class="form-control" id="totp_code"
                   name="totp_code" maxlength="6" pattern="[0-9]{6}"
                   inputmode="numeric" autocomplete="one-time-code"
                   required placeholder="000000">
          </div>
          <button type="submit" class="btn btn-danger w-100">
            Disable Two-Factor Authentication
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
