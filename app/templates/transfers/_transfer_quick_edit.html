{# Transfer quick edit — single amount input that fits inside the <td>.
   Replaces cell content on click for fast amount edits.
   Expand button (⋯) or F2 opens the full edit popover.

   Expected context: xfer — a Transfer object.
#}
<form class="txn-quick-edit d-flex align-items-center gap-1"
      hx-patch="{{ url_for('transfers.update_transfer', xfer_id=xfer.id) }}"
      hx-target="#xfer-cell-{{ xfer.id }}"
      hx-swap="innerHTML"
      hx-disabled-elt="find input">
  <input type="number"
         step="0.01"
         min="0.01"
         name="amount"
         value="{{ xfer.amount }}"
         class="form-control form-control-sm txn-quick-input"
         aria-label="Edit amount for {{ xfer.name or 'Transfer' }}"
         autofocus
         style="min-width: 0; flex: 1;">
  <button type="button"
          class="btn btn-sm btn-link p-0 xfer-expand-btn"
          title="More options (F2)"
          aria-label="More options"
          data-xfer-id="{{ xfer.id }}">
    <i class="bi bi-three-dots"></i>
  </button>
</form>
