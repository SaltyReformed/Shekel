{# Category row partial for HTMX-appended creation. #}
<li class="list-group-item">
  <div class="d-flex justify-content-between align-items-center"
       id="cat-display-{{ category.id }}">
    {{ category.item_name }}
    <div>
      <button type="button" class="btn btn-sm btn-outline-secondary"
              title="Edit"
              onclick="document.getElementById('cat-edit-{{ category.id }}').classList.remove('d-none');
                       this.closest('[id^=cat-display]').classList.add('d-none');">
        <i class="bi bi-pencil"></i>
      </button>
      <form method="POST"
            action="{{ url_for('categories.delete_category', category_id=category.id) }}"
            class="d-inline"
            data-confirm="Delete this category?">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
          <i class="bi bi-trash"></i>
        </button>
      </form>
    </div>
  </div>
  <form method="POST" id="cat-edit-{{ category.id }}"
        action="{{ url_for('categories.edit_category', category_id=category.id) }}"
        class="d-none mt-2">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-2">
      <label class="form-label small">Group</label>
      <select id="edit-group-select-{{ category.id }}" class="form-select form-select-sm"
              onchange="
                var custom = document.getElementById('edit-group-custom-{{ category.id }}');
                var hidden = document.getElementById('edit-group-name-{{ category.id }}');
                if (this.value === '__new__') {
                  custom.classList.remove('d-none');
                  hidden.value = '';
                  custom.querySelector('input').focus();
                } else {
                  custom.classList.add('d-none');
                  hidden.value = this.value;
                }">
        {% for g in group_names %}
        <option value="{{ g }}" {% if g == category.group_name %}selected{% endif %}>{{ g }}</option>
        {% endfor %}
        <option value="__new__">+ Add new group</option>
      </select>
      <div id="edit-group-custom-{{ category.id }}" class="mt-1 d-none">
        <input type="text" class="form-control form-control-sm" placeholder="New group name"
               oninput="document.getElementById('edit-group-name-{{ category.id }}').value = this.value;">
      </div>
      <input type="hidden" id="edit-group-name-{{ category.id }}" name="group_name"
             value="{{ category.group_name }}">
    </div>
    <div class="mb-2">
      <label class="form-label small">Item Name</label>
      <input type="text" name="item_name" class="form-control form-control-sm"
             value="{{ category.item_name }}" required>
    </div>
    <div class="d-flex gap-1">
      <button type="submit" class="btn btn-sm btn-primary">Save</button>
      <button type="button" class="btn btn-sm btn-outline-secondary"
              onclick="this.closest('form').classList.add('d-none');
                       document.getElementById('cat-display-{{ category.id }}').classList.remove('d-none');">
        Cancel
      </button>
    </div>
  </form>
</li>
