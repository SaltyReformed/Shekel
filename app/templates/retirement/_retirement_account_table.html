{# Partial: full retirement account projection table (thead + rows).
   Used by both the dashboard card and the HTMX OOB swap on slider change. #}
<div class="table-responsive">
<table class="table table-hover table-sm mb-0">
  <thead class="table-light">
    <tr>
      <th>Account</th>
      <th>Type</th>
      <th class="text-end">Current Balance
        <i class="bi bi-info-circle text-muted" role="button" tabindex="0" data-bs-toggle="popover" data-bs-trigger="focus" data-bs-placement="top" data-bs-content="Current balance from your account records."></i>
      </th>
      <th class="text-end">Annual Return
        <i class="bi bi-info-circle text-muted" role="button" tabindex="0" data-bs-toggle="popover" data-bs-trigger="focus" data-bs-placement="top" data-bs-content="The assumed annual growth rate used for this account's projection. Adjustable via the Assumed Annual Return slider above."></i>
      </th>
      <th class="text-end">Projected at Retirement
        <i class="bi bi-info-circle text-muted" role="button" tabindex="0" data-bs-toggle="popover" data-bs-trigger="focus" data-bs-placement="top" data-bs-content="Balance projected to your retirement date using the account's assumed growth rate, your contributions, and employer match."></i>
      </th>
    </tr>
  </thead>
  <tbody>
    {% include "retirement/_retirement_account_rows.html" %}
  </tbody>
</table>
</div>
