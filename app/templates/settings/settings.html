{% extends "base.html" %}
{% block title %}Settings — Shekel{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <h4><i class="bi bi-gear"></i> Settings</h4>

    <form method="POST" action="{{ url_for('settings.update') }}">
      <div class="mb-3">
        <label for="grid_default_periods" class="form-label">Default Grid Periods</label>
        <input type="number" id="grid_default_periods" name="grid_default_periods"
               class="form-control" min="1" max="52"
               value="{{ settings.grid_default_periods }}"
               aria-describedby="grid-periods-help">
        <div id="grid-periods-help" class="form-text">Number of pay period columns shown by default.</div>
      </div>
      <div class="mb-3">
        <label for="default_inflation_rate" class="form-label">Default Inflation Rate</label>
        <div class="input-group">
          <input type="number" step="0.0001" id="default_inflation_rate"
                 name="default_inflation_rate" class="form-control"
                 value="{{ settings.default_inflation_rate }}"
                 aria-describedby="inflation-help">
          <span class="input-group-text">%</span>
        </div>
        <div id="inflation-help" class="form-text">Used for Phase 7 expense inflation adjustments.</div>
      </div>
      <div class="mb-3">
        <label for="low_balance_threshold" class="form-label">Low Balance Threshold</label>
        <div class="input-group">
          <span class="input-group-text">$</span>
          <input type="number" id="low_balance_threshold" name="low_balance_threshold"
                 class="form-control" min="0"
                 value="{{ settings.low_balance_threshold or 500 }}"
                 aria-describedby="low-bal-help">
        </div>
        <div id="low-bal-help" class="form-text">Balance cells turn yellow when projected balance falls below this amount.</div>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-check-circle"></i> Save Settings
      </button>
    </form>
  </div>
</div>
{% endblock %}
