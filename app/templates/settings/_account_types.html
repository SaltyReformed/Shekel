<h5 class="mb-3"><i class="bi bi-bank"></i> Account Types</h5>

<div class="card">
  <div class="card-header fw-semibold">Account Types</div>
  <ul class="list-group list-group-flush">
    {% for at in account_types %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      <form method="POST" action="{{ url_for('accounts.update_account_type', type_id=at.id) }}"
            class="d-flex align-items-center flex-grow-1 me-2 account-type-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="name" value="{{ at.name }}" class="form-control form-control-sm border-0 bg-transparent"
               aria-label="Account type name">
        <button type="submit" class="btn btn-sm btn-outline-primary ms-1 d-none save-type-btn"
                aria-label="Save">
          <i class="bi bi-check"></i>
        </button>
      </form>
      {% if at.id in types_in_use %}
      <button class="btn btn-sm btn-outline-danger" disabled
              title="In use by accounts" aria-label="Cannot delete — in use">
        <i class="bi bi-trash"></i>
      </button>
      {% else %}
      <form method="POST" action="{{ url_for('accounts.delete_account_type', type_id=at.id) }}"
            class="d-inline"
            data-confirm="Delete this account type?">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit" class="btn btn-sm btn-outline-danger" aria-label="Delete {{ at.name }}">
          <i class="bi bi-trash"></i>
        </button>
      </form>
      {% endif %}
    </li>
    {% else %}
    <li class="list-group-item text-muted">No account types defined.</li>
    {% endfor %}
  </ul>
  <div class="card-body">
    <form method="POST" action="{{ url_for('accounts.create_account_type') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="input-group input-group-sm">
        <input type="text" name="name" class="form-control" required
               placeholder="New type name" aria-label="New account type name">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-plus"></i> Add
        </button>
      </div>
    </form>
  </div>
</div>

<script src="{{ url_for('static', filename='js/account_types.js') }}"></script>
