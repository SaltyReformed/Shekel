{# Inline anchor balance cell for the accounts list page.
   Expected context: acct, editing (bool).
#}
{% if editing %}
<form hx-patch="{{ url_for('accounts.inline_anchor_update', account_id=acct.id) }}"
      hx-target="this"
      hx-swap="outerHTML"
      hx-disabled-elt="find button[type=submit]"
      class="d-inline-flex align-items-center gap-1">
  <div class="input-group input-group-sm" style="max-width: 160px;">
    <span class="input-group-text">$</span>
    <input type="number" step="0.01" name="anchor_balance"
           value="{{ acct.current_anchor_balance or 0 }}"
           class="form-control" autofocus
           aria-label="Anchor balance for {{ acct.name }}"
           onkeydown="if(event.key==='Escape'){event.preventDefault();htmx.ajax('GET','{{ url_for('accounts.inline_anchor_display', account_id=acct.id) }}',{target:this.closest('form'),swap:'outerHTML'})}">
  </div>
  <button type="submit" class="btn btn-sm btn-primary" aria-label="Save">
    <i class="bi bi-check"></i>
  </button>
  <button type="button" class="btn btn-sm btn-outline-secondary" aria-label="Cancel"
          hx-get="{{ url_for('accounts.inline_anchor_display', account_id=acct.id) }}"
          hx-target="closest form"
          hx-swap="outerHTML">
    <i class="bi bi-x"></i>
  </button>
</form>
{% else %}
<span hx-get="{{ url_for('accounts.inline_anchor_form', account_id=acct.id) }}"
      hx-trigger="click"
      hx-swap="outerHTML"
      role="button"
      tabindex="0"
      class="font-mono"
      style="cursor: pointer;"
      aria-label="Anchor balance: ${{ '{:,.2f}'.format(acct.current_anchor_balance|float) if acct.current_anchor_balance is not none else '0.00' }}. Click to edit."
      title="Click to edit">
  ${{ "%.2f"|format(acct.current_anchor_balance|float) if acct.current_anchor_balance is not none else '0.00' }}
  <i class="bi bi-pencil-square text-muted ms-1 small"></i>
</span>
{% endif %}
