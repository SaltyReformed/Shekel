{# HTMX fragment: net worth over time line chart #}
{% if chart_data.labels %}
<canvas id="chart-net-worth"
        data-labels='{{ chart_data.labels | tojson }}'
        data-data='{{ chart_data.data | tojson }}'
        style="max-height: 400px;"></canvas>
{% else %}
<div class="text-muted text-center py-4">
  <i class="bi bi-cash-stack" style="font-size: 2rem;"></i>
  <p class="mt-2">No account data available. Set up accounts with current balances to see net worth projections.</p>
</div>
{% endif %}
