{# HTMX fragment: balance over time multi-line chart #}
{% if chart_data.labels %}
<div class="chart-controls mb-3">
  <div class="d-flex flex-wrap align-items-center gap-2">
    <span class="text-muted small me-1">Accounts:</span>
    {% for acct in chart_data.accounts %}
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="checkbox" value="{{ acct.id }}"
             id="acct-{{ acct.id }}" name="account_id"
             {% if chart_data.datasets|selectattr('account_id', 'equalto', acct.id)|list %}checked{% endif %}
             hx-get="{{ url_for('charts.balance_over_time') }}"
             hx-include="[name='account_id']:checked, [name='dual_axis']"
             hx-target="closest .card-body"
             hx-swap="innerHTML">
      <label class="form-check-label small" for="acct-{{ acct.id }}">{{ acct.name }}</label>
    </div>
    {% endfor %}
    <div class="form-check form-check-inline ms-3">
      <input class="form-check-input" type="checkbox" id="dual-axis-toggle"
             name="dual_axis" value="true" checked
             data-dual-axis="true">
      <label class="form-check-label small" for="dual-axis-toggle">Dual Y-Axis</label>
    </div>
  </div>
</div>
<canvas id="chart-balance-over-time"
        data-labels='{{ chart_data.labels | tojson }}'
        data-datasets='{{ chart_data.datasets | tojson }}'
        style="max-height: 400px;"></canvas>
{% else %}
<div class="text-muted text-center py-4">
  <i class="bi bi-graph-up" style="font-size: 2rem;"></i>
  <p class="mt-2">No balance data available. Set up accounts with current balances to see projections.</p>
</div>
{% endif %}
