{# HTMX fragment: amortization breakdown stacked area chart #}
{% if loan_accounts|length > 1 %}
<div class="chart-controls mb-2">
  <select class="form-select form-select-sm" style="max-width: 250px;"
          hx-get="{{ url_for('charts.amortization') }}"
          hx-target="closest .card-body"
          hx-swap="innerHTML"
          name="account_id">
    {% for acct in loan_accounts %}
    <option value="{{ acct.id }}" {% if selected_account_id == acct.id %}selected{% endif %}>
      {{ acct.name }} ({{ acct.type | replace('_', ' ') | title }})
    </option>
    {% endfor %}
  </select>
</div>
{% endif %}
{% if chart_data.labels %}
<canvas id="chart-amortization"
        data-labels='{{ chart_data.labels | tojson }}'
        data-principal='{{ chart_data.principal | tojson }}'
        data-interest='{{ chart_data.interest | tojson }}'
        data-account-name='{{ chart_data.account_name }}'
        style="max-height: 400px;"></canvas>
{% else %}
<div class="text-muted text-center py-4">
  <i class="bi bi-building" style="font-size: 2rem;"></i>
  <p class="mt-2">No loan accounts configured. Set up a mortgage or auto loan to see amortization data.</p>
</div>
{% endif %}
