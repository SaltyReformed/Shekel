# Shekel Budget App -- Continuous Integration
#
# Runs linting (pylint) and the full test suite (pytest) on every push
# to main and on pull requests.  Uses a PostgreSQL 18 service container
# to match the production database version (upgraded from PG 16 to
# PG 18 in Phase 2 of docs/audits/test_improvements/
# test-performance-implementation-plan.md to enable Phase 3's reflink-
# backed CREATE DATABASE TEMPLATE clones).
#
# Python version matches the production Dockerfile (3.14).

name: CI

# ── Triggers ──────────────────────────────────────────────────────
# Run on pushes to main and on all pull requests.  An open PR (open it
# as a draft early for pre-merge feedback) runs this check on every
# push to its branch, and the branch protection rule on main requires
# that check green before merge.  ``push`` is intentionally NOT
# extended to dev: dev work is already covered by the pull_request
# trigger, and listing dev here double-runs CI (push + pull_request)
# on every PR'd dev push for zero added coverage.
on:
  push:
    branches: [main]
  pull_request:

# ── Token permissions ─────────────────────────────────────────────
# Least privilege: this job only checks out code, installs deps, and
# runs pylint/pytest -- it needs no write scope.  Dropping GITHUB_TOKEN
# to read-only bounds the blast radius of a compromised dev dependency
# running in the install/test steps.  docker-publish.yml scopes its own
# (broader) token separately.
permissions:
  contents: read

# ── Jobs ──────────────────────────────────────────────────────────
jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # PostgreSQL service container for the test suite.  Started
    # empty; ``scripts/build_test_template.py`` (step 6 below)
    # builds ``shekel_test_template`` with schemas, tables, audit
    # infrastructure, and reference seed, which the conftest then
    # clones per pytest session.
    services:
      postgres:
        # Digest-pinned to match the dev/prod compose files (prod
        # parity: CI validates against the SAME PostgreSQL build that
        # runs in production, not a floating Debian tag).  Keep this
        # digest in lockstep with docker-compose.yml / docker-compose.dev.yml.
        image: postgres:18-alpine@sha256:96d56f7f57c6aacd1fcb908bc83b345ec5f83231ee486dd66a1baadce274db88
        env:
          POSTGRES_USER: shekel_test
          POSTGRES_PASSWORD: shekel_test
          POSTGRES_DB: shekel_test
        ports:
          # Map container port 5432 to host port 5432.
          - 5432:5432
        # Wait for PostgreSQL to accept connections before starting steps.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Environment variables available to all steps in this job.
    env:
      # Connection string for the test database.  conftest.py's
      # ``_bootstrap_worker_database`` hook overrides this per pytest
      # session by cloning ``shekel_test_template`` into a uniquely
      # named DB and rewriting the env var before the first ``import
      # app``.  The value below is the legacy fallback used only if
      # the bootstrap is skipped: it points at the empty ``shekel_test``
      # database the service container auto-creates from POSTGRES_DB.
      # That database has no schemas or tables (build_test_template.py
      # populates ``shekel_test_template``, not this one), so a skipped
      # bootstrap fails loudly at first DB access rather than silently
      # running against stale data.
      TEST_DATABASE_URL: postgresql://shekel_test:shekel_test@localhost:5432/shekel_test
      # Admin DSN consumed by both ``scripts/build_test_template.py``
      # (drops and creates ``shekel_test_template``) and by
      # ``tests/conftest.py::_bootstrap_worker_database`` (clones the
      # template into a per-session DB and drops it at
      # ``pytest_sessionfinish``).  Points at the maintenance
      # ``postgres`` database -- ``DROP DATABASE`` cannot run against
      # the connection's own database.  ``shekel_test`` is created as
      # a superuser by the postgres image's ``POSTGRES_USER`` env, so
      # ``CREATEDB`` is implicit and no explicit grant step is needed.
      TEST_ADMIN_DATABASE_URL: postgresql://shekel_test:shekel_test@localhost:5432/postgres
      # TOTP_ENCRYPTION_KEY is auto-generated per test by conftest.py.
      # No need to set it here.

    steps:
      # ── 1. Check out the repository ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # No git operations run after checkout (only pylint + pytest),
          # so the GITHUB_TOKEN need not persist in .git/config.  Avoids
          # the credential-persistence vector (zizmor artipacked).
          persist-credentials: false

      # ── 2. Set up Python ─────────────────────────────────────────
      # Use the same Python version as the production Dockerfile.
      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      # ── 3. Cache pip dependencies ────────────────────────────────
      # Speeds up subsequent runs by caching downloaded packages.
      - name: Cache pip packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install Python dependencies ───────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # ── 5. Run pylint ────────────────────────────────────────────
      # Layered pylint gate:
      #   --fail-on=E,F,shekel-decimal-from-float,shekel-refname-compare,shekel-bare-money-quantize,shekel-disable-rationale,shekel-original-principal-as-balance,shekel-balance-producer-bypass,shekel-transaction-status-bypass:
      #     always fail on errors (E), fatals (F), and the project's custom
      #     checkers (tools/pylint/shekel_checkers.py, loaded via .pylintrc) --
      #     the financial-correctness rules (decimal-from-float, refname-compare,
      #     bare-money-quantize, original-principal-as-balance), disable-rationale
      #     (every `# pylint: disable=` must carry a standard `Pylint:`
      #     why-comment), balance-producer-bypass (every balance read must go
      #     through the app.services.balance_at seam), and
      #     transaction-status-bypass (every Transaction.status_id change must go
      #     through the transaction_service.apply_status_change seam) -- even if
      #     the score stays above the threshold.  These have zero violations
      #     today, so this only ever catches a regression -- it cannot turn the
      #     current green build red.
      #   --fail-under=10: the cleanup lock-in (docs/audits/pylint-cleanup/plan.md
      #     Phase 5).  app/ is at a clean 10.00/10, so any new convention/warning
      #     that drops the score fails the build.  Enforced locally by the Stop
      #     hook via the scripts/hooks/ENFORCE_PYLINT_FLOOR sentinel.
      - name: Lint with pylint
        run: pylint app/ --fail-under=10 --fail-on=E,F,shekel-decimal-from-float,shekel-refname-compare,shekel-bare-money-quantize,shekel-disable-rationale,shekel-original-principal-as-balance,shekel-balance-producer-bypass,shekel-transaction-status-bypass --output-format=colorized

      # ── 5a. Lint scripts/ ────────────────────────────────────────
      # Same layered gate for the operational CLI scripts.  scripts/
      # reached 10.00/10 on 2026-06-11 (docs/audits/pylint-cleanup/
      # plan.md Phase 5 step 5); without this step nothing in CI stops
      # a merge from regressing it -- the per-edit hooks only cover
      # local edits.  Linted as a separate invocation (per-tree floor):
      # whether the COMBINED `pylint app/ scripts/` run should also
      # gate cross-tree duplicate-code is a separate open decision in
      # docs/audits/pylint-cleanup/deep-quality-hunt.md.
      - name: Lint scripts with pylint
        run: pylint scripts/ --fail-under=10 --fail-on=E,F,shekel-decimal-from-float,shekel-refname-compare,shekel-bare-money-quantize,shekel-disable-rationale,shekel-original-principal-as-balance,shekel-balance-producer-bypass,shekel-transaction-status-bypass --output-format=colorized

      # ── 5b. Custom-checker unit tests + tests/ Decimal scan ──────
      # The checkers themselves are unit-tested (every "flags" case paired with a
      # "must-not-flag" case). tests/ are out of general pylint scope, but a
      # float-sourced Decimal in a hand-computed assertion is a real bug, so the
      # one monetary-precision checker is applied there too. unknown/bad-option-value
      # are disabled explicitly (--disable=all does not cover option-validity
      # meta-messages) so the test files' "disable=X -- explanation" inline
      # comments do not derail this targeted scan.
      - name: Test and apply custom pylint checkers
        run: |
          pytest tools/pylint/tests -c /dev/null -q
          pylint tests/ --disable=all --enable=shekel-decimal-from-float --disable=unknown-option-value,bad-option-value --output-format=colorized

      # ── 5c. Cross-tree duplicate-code (app/ + scripts/ combined) ─
      # R0801 is computed over the linted set, so the per-tree runs in
      # steps 5 and 5a can never see an app/-to-scripts/ copy -- the
      # drift class behind the MFA-clear and seed-vs-register
      # duplications consolidated on 2026-06-11.  This combined run
      # enables ONLY duplicate-code; everything else is already
      # enforced per tree.  Verified to detect the historical clusters
      # (the pre-consolidation commit fails this exact invocation) and
      # to pass on the consolidated tree.
      - name: Cross-tree duplicate-code (pylint app/ + scripts/)
        run: pylint app/ scripts/ --disable=all --enable=duplicate-code --disable=unknown-option-value,bad-option-value --output-format=colorized

      # ── 6. Build the per-pytest-session template database ───────
      # Builds ``shekel_test_template``: drops + recreates the
      # database, runs the Alembic chain to ``head``, applies the
      # audit infrastructure idempotently, seeds reference data,
      # and truncates ``system.audit_log`` so the template ships
      # with a zeroed log.  ``tests/conftest.py::_bootstrap_worker_database``
      # then clones this template into a uniquely-named DB for
      # every pytest session (and every pytest-xdist worker within
      # a session) at startup, and drops the clone at
      # ``pytest_sessionfinish``.  Without this step the bootstrap
      # raises ``RuntimeError`` on the first test.  Inherits
      # ``TEST_ADMIN_DATABASE_URL`` from the job env; ``SECRET_KEY``
      # is defaulted by the script (the template DB is never reached
      # through Gunicorn, so the value is purely scaffolding).
      - name: Build test template database
        run: python scripts/build_test_template.py

      # ── 7. Run pytest ────────────────────────────────────────────
      # ``pytest.ini`` carries ``-n 12 --dist=loadgroup`` in
      # ``addopts``, so the invocation does not need an explicit
      # parallelism flag.  Each worker's session-start hook clones
      # ``shekel_test_template`` (built in the previous step) into a
      # uniquely-named per-session DB and drops it at session end;
      # no manual database setup is needed.
      - name: Run tests
        run: pytest --tb=short -q

  # ── Polyglot linters ──────────────────────────────────────────────
  # Non-Python lint floors adopted in docs/audits/polyglot-cleanup
  # (shell, JS/CSS, Jinja templates, workflows, Dockerfile, YAML,
  # secrets, spelling). Mirrors the local .pre-commit-config.yaml hooks.
  # Binary tools are pinned by version and downloaded (no extra
  # third-party actions to SHA-pin); the pip tools (yamllint, zizmor,
  # djlint) come from requirements-dev.txt. Each tool reads its own
  # in-repo config file. NOTE: add this job to the branch-protection
  # required checks to make the floor block merges (it runs on every PR
  # regardless).
  polyglot-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Cache pip packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # pip-installable linters (yamllint, zizmor, djlint) + jinja2 for the
      # template parse check, all pinned in requirements-dev.txt.
      - name: Install pip linters
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Version-pinned standalone binaries, extracted to ~/.local/bin via
      # `find` so a change in an archive's internal layout cannot break the
      # step. shellcheck is pinned to 0.11.0 specifically: the optional
      # masked-errexit groups in .shellcheckrc need >= 0.10 and the runner's
      # preinstalled build may lag.
      - name: Install pinned binary linters
        run: |
          set -euo pipefail
          bin="${HOME}/.local/bin"
          mkdir -p "${bin}"
          echo "${bin}" >> "${GITHUB_PATH}"
          tmp="$(mktemp -d)"
          curl -fsSL https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz | tar -xJf - -C "${tmp}"
          curl -fsSL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz | tar -xzf - -C "${tmp}"
          curl -fsSL https://github.com/crate-ci/typos/releases/download/v1.47.2/typos-v1.47.2-x86_64-unknown-linux-musl.tar.gz | tar -xzf - -C "${tmp}"
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xzf - -C "${tmp}"
          curl -fsSL -o "${tmp}/shfmt" https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          curl -fsSL -o "${tmp}/biome" "https://github.com/biomejs/biome/releases/download/@biomejs/biome@2.4.16/biome-linux-x64"
          curl -fsSL -o "${tmp}/hadolint" https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          for t in shellcheck actionlint typos gitleaks; do
              install -m 0755 "$(find "${tmp}" -type f -name "${t}" | head -1)" "${bin}/${t}"
          done
          install -m 0755 "${tmp}/shfmt" "${bin}/shfmt"
          install -m 0755 "${tmp}/biome" "${bin}/biome"
          install -m 0755 "${tmp}/hadolint" "${bin}/hadolint"

      - name: shellcheck (shell)
        run: git ls-files -z '*.sh' 'entrypoint.sh' | xargs -0 -r shellcheck

      - name: shfmt (shell format check)
        run: git ls-files -z '*.sh' 'entrypoint.sh' | xargs -0 -r shfmt -d -i 4 -ci -bn

      - name: yamllint
        run: git ls-files -z '*.yml' '*.yaml' | xargs -0 -r yamllint

      - name: actionlint (GitHub workflows)
        run: actionlint

      - name: zizmor (workflow security)
        env:
          GH_TOKEN: ${{ github.token }}
        run: zizmor .github/workflows/

      - name: biome (JS + CSS)
        run: biome lint app/static/js app/static/css

      - name: hadolint (Dockerfile)
        run: hadolint Dockerfile

      - name: gitleaks (committed-secret scan)
        run: gitleaks dir . --no-banner --redact

      - name: typos (content spell check)
        run: typos

      - name: djlint (Jinja templates, lint-only)
        run: djlint app/templates/ --lint

      - name: jinja2 template parse check
        run: python scripts/check_template_syntax.py

      - name: rumdl (Markdown lint + format check)
        run: rumdl check

      - name: docker compose schema validation
        run: |
          for f in docker-compose.yml docker-compose.dev.yml docker-compose.build.yml; do
              docker compose -f "${f}" config --no-interpolate -q
          done
          docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml config --no-interpolate -q
