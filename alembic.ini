# Shekel Budget App — Alembic Configuration
#
# This file is used by Flask-Migrate for database migrations.
# The sqlalchemy.url is overridden by Flask-Migrate at runtime,
# so the value here is just a fallback.

[alembic]
# Path to migration scripts.
script_location = migrations

# Template used to generate migration files.
# file_template = %%(rev)s_%%(slug)s

# Truncate long revision identifiers (default: false).
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file.
sourceless = false

# Version location specification.
version_locations = %(here)s/migrations/versions

# Version path separator; default is OS-specific.
# version_path_separator = os

# Output encoding for migration script files.
output_encoding = utf-8

# Fallback database URL (overridden by Flask-Migrate).
sqlalchemy.url = postgresql://shekel_user:shekel_pass@localhost:5432/shekel


[post_write_hooks]
# Uncomment to run pylint on generated migrations:
# hooks = pylint
# pylint.type = console_scripts
# pylint.entrypoint = pylint
# pylint.options = --disable=all --enable=W0611


# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
