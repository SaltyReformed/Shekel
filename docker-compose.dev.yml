# Shekel Budget App -- Development Docker Compose
#
# For developers with the full source tree.  End users should use
# docker-compose.yml with the pre-built GHCR image instead.
#
# Provides PostgreSQL for local development.
#
# IMPORTANT: This file uses the project name "shekel-dev" to isolate
# dev volumes and containers from production.  Docker Compose derives
# the project name from the directory, which could collide with a
# production setup on the same machine.  The name: field below forces
# a safe project name regardless of directory.
#
# Primary workflow (recommended):
#   1. docker compose -f docker-compose.dev.yml up db
#   2. flask run    (from host, connects to containerized Postgres)
#
# Full stack (containerized dev app with live reload):
#   docker compose -f docker-compose.dev.yml up
#
# Both workflows:
#   docker compose -f docker-compose.dev.yml up db test-db

name: shekel-dev

services:
  db:
    image: postgres:18-alpine
    container_name: shekel-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shekel_user
      POSTGRES_PASSWORD: shekel_pass
      POSTGRES_DB: shekel
    ports:
      # Loopback-only bind (audit finding F-057 / Commit C-35).  The
      # dev databases use the public credentials shekel_user / shekel_pass
      # that are committed into this compose file and therefore
      # readable by anyone with repo access.  Binding 0.0.0.0:5432 (the
      # implicit Docker default) made the DB reachable from any LAN
      # device that could route to the developer's host: a phone, a
      # compromised IoT device, an unrelated container on a shared
      # network.  Pinning to 127.0.0.1 keeps the DB reachable from
      # ``flask run`` on the host (which connects via localhost) but
      # not from anywhere off-host.
      - "127.0.0.1:5432:5432"
    volumes:
      # Mount target is the PARENT directory ``/var/lib/postgresql``,
      # not the legacy ``/var/lib/postgresql/data`` path used under
      # PG 16.  PG 18+ docker-library images (docker-library/postgres
      # PR #1259) switched to the pg_ctlcluster layout: PGDATA
      # defaults to ``/var/lib/postgresql/$PG_MAJOR/docker`` and the
      # entrypoint refuses to start when a legacy mount exists at
      # ``/var/lib/postgresql/data``.  Mounting at the parent lets
      # the per-major-version subdirectory live inside the named
      # volume and stays correct across future major-version bumps
      # (PG 19, PG 20...) without another mount-path edit.  Mirrors
      # the same migration applied to the ``test-db`` tmpfs in
      # Phase 2a (see the test-db service comment block below).
      - pgdata:/var/lib/postgresql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shekel_user -d shekel"]
      interval: 10s
      timeout: 5s
      retries: 5

  test-db:
    image: postgres:18-alpine
    container_name: shekel-dev-test-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shekel_user
      POSTGRES_PASSWORD: shekel_pass
      POSTGRES_DB: shekel_test
    ports:
      # Loopback-only bind (audit finding F-057 / Commit C-35).  See
      # the db service above for the full rationale; the test DB has
      # the same exposure profile and the same fix.
      - "127.0.0.1:5433:5432"
    # btrfs-backed PGDATA: the test cluster's data directory lives
    # on a host btrfs subvolume bind-mounted into the container so
    # PostgreSQL 18's ``CREATE DATABASE ... TEMPLATE ... STRATEGY
    # FILE_COPY`` can use the kernel's ``FICLONE`` reflink ioctl to
    # clone the template's data files as a constant-time metadata
    # copy.  Pairs with the ``file_copy_method=clone`` GUC at the
    # bottom of the command: list below; both must be in place for
    # the reflink path to engage.  Replaces the Phase 1a tmpfs mount
    # (Phase 3a of
    # docs/audits/test_improvements/test-performance-implementation-plan.md);
    # see boringSQL's instant-clone benchmark for the order-of-
    # magnitude effect (6 GB clones in ~212 ms on a reflink
    # filesystem vs ~67 s on PG 17 without the path):
    # https://boringsql.com/posts/instant-database-clones/.
    #
    # The subvolume MUST be a btrfs subvolume (not a Docker named
    # volume or a tmpfs).  Docker's overlay2 storage driver does
    # NOT preserve ``FICLONE`` through its copy-on-write layer, so
    # a named volume would silently fall back to byte-by-byte copy
    # (seconds per clone, not milliseconds).  Verify the subvolume
    # is on btrfs with ``stat -f /var/lib/shekel-test-pgdata``
    # reporting ``Type: btrfs``.
    #
    # Operator setup (one-time, requires sudo on the host):
    #
    #   sudo btrfs subvolume create /var/lib/shekel-test-pgdata
    #   sudo chown 70:70 /var/lib/shekel-test-pgdata
    #
    # ``uid=70``/``gid=70`` matches the ``postgres`` user inside the
    # alpine image (verified via
    # ``docker run --rm postgres:18-alpine id postgres``); postgres
    # refuses to start when PGDATA is owned by anyone else.
    #
    # Trade-offs vs the Phase 1a tmpfs mount this replaces:
    #
    #   * Data persists across container restarts (and host reboots).
    #     A developer can inspect ``pg_data`` after a crash without
    #     losing it; removing the cluster's state requires
    #     ``sudo btrfs subvolume delete /var/lib/shekel-test-pgdata``.
    #   * Reads and writes go to disk rather than RAM, but the
    #     reflink-backed ``CREATE DATABASE`` path is strictly faster
    #     than the TRUNCATE+reseed cycle it supersedes (constant-
    #     time clone vs O(catalog rewrite per table)).
    #   * ``fsync=off`` / ``synchronous_commit=off`` /
    #     ``full_page_writes=off`` remain correct -- the cluster is
    #     still throwaway; a crash that loses the last committed
    #     transactions is recovered by re-running the test, not by
    #     replaying WAL.  DO NOT copy any of these settings to the
    #     ``db`` service above; that cluster holds development data
    #     that must survive a host reboot.
    #
    # Mount target is the PARENT directory ``/var/lib/postgresql``,
    # not the legacy ``/var/lib/postgresql/data`` path used under
    # PG 16.  PG 18+ docker-library images (docker-library/postgres
    # PR #1259) switched to the pg_ctlcluster layout: PGDATA
    # defaults to ``/var/lib/postgresql/$PG_MAJOR/docker`` (verified
    # via ``docker run --rm postgres:18-alpine env | grep PGDATA``
    # which prints ``/var/lib/postgresql/18/docker``) and the
    # entrypoint actively refuses to start when a legacy mount
    # exists at ``/var/lib/postgresql/data``.  Mounting the parent
    # path lets the per-major-version subdirectory live inside the
    # subvolume without the legacy-layout guard rail firing, and
    # stays correct across future major-version bumps (PG 19, PG
    # 20...) without another mount-path edit.
    volumes:
      - /var/lib/shekel-test-pgdata:/var/lib/postgresql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    # First triplet: kill zombie transactions from crashed test runs
    # after 30s, prevent infinite lock/statement waits, and keep TCP
    # connections alive so the OS detects dead clients.  Middle
    # triplet (``fsync`` / ``synchronous_commit`` / ``full_page_writes``)
    # are the non-durable knobs documented in the volumes comment
    # above.  Trailing ``file_copy_method=clone`` (Phase 3a) makes
    # PG 18's ``CREATE DATABASE ... STRATEGY FILE_COPY`` use the
    # kernel ``FICLONE`` reflink ioctl on btrfs-backed PGDATA; the
    # conftest's per-test drop+reclone helper (Phase 3b) issues
    # ``STRATEGY FILE_COPY`` explicitly so the GUC is consumed.
    # GUC is per-cluster -- adding it to the ``db`` service above
    # would be inert (that cluster never invokes
    # ``CREATE DATABASE TEMPLATE``) and is intentionally omitted.
    command:
      - postgres
      - -c
      - idle_in_transaction_session_timeout=30000
      - -c
      - lock_timeout=10000
      - -c
      - statement_timeout=30000
      - -c
      - tcp_keepalives_idle=60
      - -c
      - tcp_keepalives_interval=10
      - -c
      - tcp_keepalives_count=3
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
      - -c
      - file_copy_method=clone
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shekel_user -d shekel_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: shekel-dev-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      # SECRET_KEY must be set in .env (or shell env) -- no placeholder
      # default.  Generate with:
      #   python -c "import secrets; print(secrets.token_hex(32))"
      # The :? syntax fails compose with a clear error if unset.
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env (see .env.example)}
      DATABASE_URL: postgresql://shekel_user:shekel_pass@db:5432/shekel
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: shekel_user
      DB_PASSWORD: shekel_pass
      DB_NAME: shekel
      # Least-privilege app role password.  Required by entrypoint.sh
      # in every environment.  The value below is a non-secret
      # development default -- anyone reading the compose file knows
      # it and the dev DB is host-only -- so we hard-code it here
      # rather than forcing every developer to add another line to
      # .env.  Production uses a real random secret via
      # docker-compose.yml's APP_ROLE_PASSWORD: ${APP_ROLE_PASSWORD:?...}
      # check.  See audit finding F-081 / Commit C-13.
      APP_ROLE_PASSWORD: dev-only-shekel-app-role-password-change-in-prod
      SEED_USER_EMAIL: admin@shekel.local
      SEED_USER_PASSWORD: ChangeMe!2026
      SEED_USER_DISPLAY_NAME: Budget Admin
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:-}
    ports:
      # Flask dev server on port 5000, mapped directly to host.
      # No Nginx in development.
      - "5000:5000"
    volumes:
      # Mount source code for live reload.  Flask's reloader detects
      # file changes and restarts automatically.
      - .:/home/shekel/app
    # Override: use Flask dev server instead of Gunicorn.
    # The entrypoint.sh still runs (DB init, seeding), then exec's
    # this command instead of the Dockerfile CMD (gunicorn).
    command: ["flask", "run", "--host=0.0.0.0", "--port=5000"]

volumes:
  pgdata:
