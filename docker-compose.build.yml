# Shekel Budget App -- Build Override
#
# For self-hosted deployments that build from source.
# Use alongside docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d
#
# End users pulling pre-built images from GHCR do not need this file.
#
# This override changes ONLY the image source (local build instead of
# the GHCR pull).  Networks, hardening, healthchecks, and resource
# caps all flow through from the base file unchanged.  A previous
# revision also attached the app to a shared ``monitoring`` network
# for a Promtail-era log pipeline; the deployed collector (Grafana
# Alloy) discovers containers over the Docker socket and needs no
# shared network, so that coupling was removed (parity audit
# 2026-06-12, finding M06 in docs/audits/dev-prod-parity/findings.md).

services:
  app:
    build: .
