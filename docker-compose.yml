# Shekel Budget App -- Production Docker Compose
#
# Architecture:
#   [Client] --> [Nginx :80] --> [Gunicorn :8000] --> [PostgreSQL :5432]
#
# Networks:
#   frontend: Nginx (externally accessible)
#   backend:  Nginx + App + DB (internal only)
#
# Quick start:
#   1. Copy .env.example to .env and fill in values
#   2. docker volume create shekel-prod-pgdata
#   3. docker compose up -d
#   4. Open http://localhost (via Nginx)
#
# Update:
#   docker compose pull && docker compose up -d
#
# DATA SAFETY: The PostgreSQL volume (shekel-prod-pgdata) is external.
# This means "docker compose down -v" will NOT delete your database.
# To destroy production data you must explicitly run:
#   docker volume rm shekel-prod-pgdata

name: shekel-prod

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  db:
    # Pinned to postgres:18-alpine 18.3 (digest sha256:54451e...).  The
    # tag-plus-digest form documents the human-readable version and
    # guarantees the immutable bytes.  Update both halves together when
    # bumping minor versions; see deploy/README.md "Image digest pinning"
    # for the workflow.  PG 18+ changed PGDATA from
    # /var/lib/postgresql/data to /var/lib/postgresql/$PG_MAJOR/docker
    # (PR docker-library/postgres#1259) and refuses to start when a
    # legacy mount sits at the old path; the volumes block below mounts
    # the named volume at the parent /var/lib/postgresql so the per-
    # major-version subdir lives inside the volume.
    image: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    container_name: shekel-prod-db
    restart: unless-stopped
    # ``user: postgres`` is load-bearing alongside ``cap_drop: ALL``
    # (audit findings F-055, F-056, F-117 / Commit C-35).  The
    # postgres:16-alpine entrypoint, when it sees uid 0, runs
    # ``chown -R postgres /var/lib/postgresql/data`` and
    # ``chown -R postgres /var/run/postgresql`` and then drops to the
    # postgres user via ``gosu``.  With ``cap_drop: ALL`` neither
    # chown call has ``CAP_CHOWN`` and the entrypoint exits non-zero,
    # taking the container with it.  Pinning ``user: postgres``
    # (uid 70 in the alpine image) makes the entrypoint's
    # ``[ "$(id -u)" = '0' ]`` branch fall through -- chown is
    # skipped entirely and ``postgres`` exec's with the same uid the
    # gosu drop would have switched to.  The existing
    # shekel-prod-pgdata volume is already postgres-owned (the
    # previous root-mode entrypoint chowned it on first init), so
    # the postgres user has full write access to PGDATA.
    user: postgres
    environment:
      POSTGRES_USER: shekel_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: shekel
    volumes:
      # PG 18+ docker-library images (PR docker-library/postgres#1259)
      # default PGDATA to /var/lib/postgresql/$PG_MAJOR/docker and refuse
      # to start when a legacy mount sits at /var/lib/postgresql/data.
      # Mounting the named volume at the parent /var/lib/postgresql lets
      # the per-major-version subdir live inside the volume and stays
      # correct across future PG major bumps (PG 19, 20...) without
      # another mount-path edit.  Mirrors the dev/test-db migration in
      # docker-compose.dev.yml.
      - shekel-prod-pgdata:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shekel_user -d shekel"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Container logs rotate locally so the host disk cannot fill from
    # an unbounded log stream (audit finding F-116 / Commit C-35).
    # Postgres is low-volume in steady state but emits verbose query
    # logs during migrations, so 3 x 10 MiB is enough scrollback for
    # the operator without risking the host partition.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Resource caps -- audit findings F-115 (Commit C-35).  Postgres
    # uses shared_buffers (default 128 MiB) plus per-connection
    # work_mem; the limits below give comfortable headroom for a
    # single-user personal-finance deployment with the default
    # max_connections.  pids covers one process per connection plus
    # background workers (autovacuum launcher, walwriter, checkpointer,
    # background writer, stats collector, logical replication launcher).
    # Reservations let the daemon's OOM scoring prefer evicting other
    # containers under host pressure.  Migrated 2026-05-14 from legacy
    # mem_limit/pids_limit to the Compose-Spec deploy.resources form
    # that the rest of /opt/docker has standardised on.
    deploy:
      resources:
        limits: { cpus: '2', memory: 1G, pids: 256 }
        reservations: { cpus: '0.25', memory: 256M }
    # File-descriptor caps for Postgres.  PG opens fds for every backend
    # connection, every relation file, every WAL segment; the alpine
    # image's default 1024-soft cap is the leading cause of
    # "Too many open files" once a maintenance op (pg_repack, large
    # VACUUM FULL) runs.  65535/65535 matches the operator standard
    # used in /opt/docker/.
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # Container hardening -- audit findings F-055, F-056, F-117
    # (Commit C-35).  Drop every Linux capability, prevent privilege
    # escalation via setuid binaries, and run with a read-only root
    # filesystem.  Postgres binds TCP/5432 (non-privileged), so no
    # capability needs to be added back.  Writable paths the postgres
    # process needs:
    #   - /var/lib/postgresql/data: real volume (mounted above)
    #   - /var/run/postgresql:      tmpfs for the unix socket
    #   - /tmp:                     tmpfs for general temp files
    # Default tmpfs mode 1777 lets the postgres user create the
    # socket without needing CAP_CHOWN; the entrypoint's
    # ``chmod 03775 /var/run/postgresql || :`` falls through silently
    # because the directory is already world-writable on tmpfs.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  # ── Redis (Flask-Limiter Storage) ────────────────────────────────
  # Holds rate-limit counters that must be shared across Gunicorn
  # workers and survive app-container restarts.  See audit finding
  # F-034 and remediation Commit C-06.  No password is set because the
  # backend network (internal: true, see networks block at end of
  # file) is unreachable from the host or any other container outside
  # this compose stack -- only the app and nginx services can talk to
  # Redis.  Persistence is intentionally disabled (--save "" and
  # --appendonly no): rate-limit counters are short-lived state and
  # writing them to disk would (a) increase IO with no security
  # benefit, (b) risk persisting cleartext counter keys to disk where
  # the operator might forget about them, (c) slow Redis restarts.
  redis:
    image: redis:7.4-alpine
    container_name: shekel-prod-redis
    restart: unless-stopped
    networks:
      - backend
    # Redis CLI flags:
    #   --save ""           Disable RDB snapshots.
    #   --appendonly no     Disable AOF persistence.
    #   --maxmemory 64mb    Cap RAM at 64 MiB; this is far above the
    #                       working set for per-IP rate-limit counters
    #                       in a single-user app but provides
    #                       headroom if the limiter ever stores
    #                       per-user lockout state under C-11.
    #   --maxmemory-policy allkeys-lru  Evict the least-recently used
    #                       key on OOM rather than returning errors
    #                       (which the limiter would surface as 500s
    #                       under fail-closed posture).
    command:
      - "redis-server"
      - "--save"
      - ""
      - "--appendonly"
      - "no"
      - "--maxmemory"
      - "64mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      # ── Phase B3 ACL hardening (2026-05-09) ────────────────────────
      # Defense-in-depth: even though the backend network is internal,
      # an attacker who lands code execution in the app container
      # (Gunicorn RCE, container-escape from a sibling, etc.) gets
      # network access to Redis.  ACLs limit what that pivot can do.
      #
      # Disable the default user (was: on, nopass, ~* &* +@all).
      # Anyone connecting without explicit AUTH gets no commands.
      - "--user"
      - "default"
      - "off"
      # Per-app user.  Key pattern is `~LIMITS*` -- the observed key
      # format from the limits library (Flask-Limiter's storage
      # backend) is `LIMITS:LIMITER/<ip>/<endpoint>/<limit>/<value>/
      # <window>`.  `~LIMITS*` matches every Flask-Limiter key while
      # still blocking access to any other namespace a co-tenant
      # might try to enumerate.  RATELIMIT_KEY_PREFIX on the app side
      # does NOT propagate down to the limits lib's hardcoded key
      # prefix, so we match the actual format the lib emits.  `&*`
      # allows pubsub on any channel (Flask-Limiter doesn't use
      # pubsub today).  `-@dangerous` blocks FLUSHDB/FLUSHALL/CONFIG/
      # DEBUG/MIGRATE/MONITOR/SAVE/SHUTDOWN/KEYS.
      - "--user"
      - "shekel"
      - "on"
      - ">${SHEKEL_REDIS_PASSWORD:?Set SHEKEL_REDIS_PASSWORD in .env}"
      - "resetkeys"
      - "~LIMITS*"
      - "&*"
      - "+@all"
      - "-@dangerous"
      # Healthcheck user: nopass + PING only.  Lets the Compose
      # `service_healthy` gate work without exposing a password to
      # `ps`/healthcheck-eval contexts.
      - "--user"
      - "healthcheck"
      - "on"
      - "nopass"
      - "resetkeys"
      - "+ping"
    healthcheck:
      # PING via the dedicated healthcheck ACL user.  `-a ''` is
      # required because redis-cli's --user flag does NOT auto-send
      # an AUTH frame unless -a is also present (even with empty
      # password for nopass users).  Without -a the connection stays
      # unauthenticated and PING returns NOAUTH but redis-cli exits
      # 0 -- a silent false-healthy.  Grep for PONG to make the
      # exit code reflect the actual response.
      test: ["CMD-SHELL", "redis-cli --user healthcheck -a '' --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Resource caps -- Redis is a tightly-bounded service so we cap
    # both memory and process count to limit blast radius if the
    # container is ever exploited.  Migrated 2026-05-14 from legacy
    # mem_limit/pids_limit to the Compose-Spec deploy.resources form.
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 96M, pids: 100 }
    # Container hardening: drop every Linux capability, prevent
    # privilege escalation, and run with a read-only root filesystem.
    # Redis only needs to write to /tmp (for any temp files it might
    # create) and /data (which we mount as tmpfs since persistence
    # is disabled anyway).
    #
    # ``user: redis`` is load-bearing alongside ``cap_drop: ALL``.  The
    # redis:7.4-alpine entrypoint, when it sees uid 0, runs
    # ``chown -R redis /data`` and then drops to the redis user via
    # ``gosu``.  With ``cap_drop: ALL`` the chown lacks ``CAP_CHOWN`` and
    # exits non-zero, taking the container with it.  Starting as the
    # redis user from the outset makes the entrypoint's ``id -u != 0``
    # branch fire instead -- chown is skipped entirely and ``redis-server``
    # exec's with the same uid the chown would have switched to.  The
    # tmpfs /data mount is owned by root:root at creation, but Redis
    # never tries to chown it in this branch and only writes to it when
    # AOF / RDB are enabled (both disabled above).
    user: redis
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /data

  # ── Flask Application (Gunicorn) ─────────────────────────────────
  app:
    # IMAGE PINNING (audit findings F-060, F-155 / Commit C-36)
    # ----------------------------------------------------------
    # The base file ships ``:latest`` so the README Quick Start works
    # for an end user copying ``docker compose up -d`` verbatim.  In
    # PRODUCTION this MUST be overridden with an immutable
    # ``@sha256:<digest>`` reference so:
    #   (a) every ``docker compose up`` pulls the same bytes (audit
    #       finding F-060: ``:latest`` + ``pull_policy: always`` lets
    #       a single push to the tag silently swap the container image
    #       at every restart);
    #   (b) ``cosign verify`` can attest to the exact image bytes that
    #       are about to run (audit finding F-155: signature
    #       verification requires a known digest).
    #
    # The shared-mode override at ``deploy/docker-compose.prod.yml``
    # carries the override -- it interpolates ``SHEKEL_IMAGE_DIGEST``
    # from the host ``.env`` and FAILS LOUDLY (via the ``${VAR:?...}``
    # syntax) if the operator has not pinned a digest.  See
    # ``deploy/README.md`` -> "Image digest pinning" for the rotation
    # workflow.
    #
    # End users running the bundled-mode quickstart inherit the
    # ``:latest`` reference below; they are explicitly out of scope
    # for the audit's production hardening but should still pin a
    # digest by adding a sibling ``docker-compose.override.yml``
    # (see deploy/README.md) before any non-trivial deployment.
    image: ghcr.io/saltyreformed/shekel:latest
    # Always pull the latest image -- prevents stale cached :latest tags
    # from causing port mismatches or missing fixes.  When the prod
    # override pins a digest, this is a no-op for that pull because
    # the digest already addresses an immutable manifest.
    pull_policy: always
    container_name: shekel-prod-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        # service_healthy ensures Redis answers PING before Gunicorn
        # starts.  This matters because the app runs with
        # in_memory_fallback_enabled=False and swallow_errors=False
        # (fail-closed posture) -- if Gunicorn boots before Redis is
        # ready, the very first auth attempt would return 500 instead
        # of the user's expected 200/302.
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      # Owner role connection URL (full DDL rights).  Used by
      # entrypoint.sh's deployment scripts (init_db.sql,
      # init_database.py, seed_*.py).  See audit finding F-081 /
      # remediation Commit C-13 for the two-role policy.
      DATABASE_URL: postgresql://shekel_user:${POSTGRES_PASSWORD}@db:5432/shekel
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: shekel_user
      # DB_PASSWORD must match POSTGRES_PASSWORD (set on the db service
      # above).  entrypoint.sh reads it as PGPASSWORD for psql commands
      # that create schemas and run seed scripts.
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: shekel
      # Least-privilege application role password.  entrypoint.sh
      # provisions the shekel_app role under this password (via
      # init_db.sql) and constructs DATABASE_URL_APP from it
      # immediately before exec'ing Gunicorn so the runtime app uses
      # DML-only credentials.  Required, no default -- a missing
      # value fails the entrypoint shape check.  See audit finding
      # F-081.
      APP_ROLE_PASSWORD: ${APP_ROLE_PASSWORD:?Set APP_ROLE_PASSWORD in .env}
      # Seed user credentials.  These are read by entrypoint.sh's
      # ``python scripts/seed_user.py`` step on first start, then
      # scrubbed from the entrypoint shell's env (and from
      # ``os.environ`` inside the script) BEFORE Gunicorn is exec'd.
      # The scrub means ``cat /proc/<gunicorn-pid>/environ | grep SEED_USER``
      # returns nothing in steady state -- closing the in-process
      # exposure called out in audit finding F-022.  See
      # remediation Commit C-34 for the full mechanism.
      #
      # NOTE: ``docker exec shekel-prod-app env`` still surfaces these
      # values because Docker stores them in ``Container.Config.Env``
      # at container creation time, independent of any in-container
      # ``unset``.  Migrating these to Docker secrets (Commit C-38)
      # closes that residual channel.  In the meantime, the operator
      # SHOULD remove the SEED_USER_* lines from .env after the first
      # successful boot and recreate the container
      # (``docker compose up -d --force-recreate app``) so the stored
      # configured env no longer carries the password.
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-}
      SEED_USER_DISPLAY_NAME: ${SEED_USER_DISPLAY_NAME:-Budget Admin}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:-}
      # Retired TOTP keys for non-destructive rotation.  Empty in
      # steady state; populated transiently during key rotation.
      # See docs/runbook_secrets.md "Rotating TOTP_ENCRYPTION_KEY".
      TOTP_ENCRYPTION_KEY_OLD: ${TOTP_ENCRYPTION_KEY_OLD:-}
      # Public-registration toggle.  Default ``false`` in production
      # (audit finding F-053 / Commit C-34): a personal-finance app
      # intended for a known user set should not ship with an open
      # registration surface.  /register returns 404 when this is
      # false; the registration link is hidden on /login.  Operators
      # who want to enable registration must set REGISTRATION_ENABLED=true
      # in .env explicitly -- the docker-compose default is the safe
      # posture, and ProdConfig at app/config.py defaults to False
      # too (defense-in-depth against this docker default being
      # removed).
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SLOW_REQUEST_THRESHOLD_MS: ${SLOW_REQUEST_THRESHOLD_MS:-500}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-365}
      # Flask-Limiter storage.  Defaults to the bundled redis service
      # above; override with a managed Redis URI (e.g. Upstash, ElastiCache)
      # if not running redis as a sibling container.  See audit finding
      # F-034 and remediation Commit C-06.
      #
      # 2026-05-14: the bundled redis now uses ACLs (default user
      # disabled, see redis.command above).  The URI must include the
      # per-app user `shekel` and its password from .env.
      # RATELIMIT_KEY_PREFIX is informational -- the limits library's
      # Lua script uses its own internal key format (LIMITS:...) that
      # doesn't propagate this prefix -- but is kept for any code
      # paths that DO honour it.
      RATELIMIT_STORAGE_URI: ${RATELIMIT_STORAGE_URI:-redis://shekel:${SHEKEL_REDIS_PASSWORD}@redis:6379/0}
      RATELIMIT_KEY_PREFIX: ${RATELIMIT_KEY_PREFIX:-shekel}
      # Gunicorn proxy trust.  Pinned to the ``backend`` bridge subnet
      # below (172.31.0.0/24) so Gunicorn honours X-Forwarded-* only
      # from the in-stack nginx -- the only sibling on this internal
      # bridge that proxies user traffic.  No fallback default in
      # gunicorn.conf.py: a missing value fails the config load.  Audit
      # finding F-015, Commit C-33.  Override only if the ``backend``
      # subnet is repinned in this compose file.
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-172.31.0.0/24}
      # Disable Python bytecode cache.  With ``read_only: true`` below
      # (Commit C-35), Python cannot write ``__pycache__`` directories
      # under /home/shekel/app and would log noisy "permission denied"
      # warnings on every import.  Setting this to ``1`` skips the
      # write attempt entirely.  Functionally equivalent: bytecode is
      # compiled in-memory per process; the production workload is
      # long-running so the one-time compile cost is amortised.
      PYTHONDONTWRITEBYTECODE: "1"
      # Force unbuffered stdout/stderr.  Container logs reach Docker's
      # json-file driver (and downstream Loki via Alloy) line-by-line
      # rather than waiting for a flush, so an OOM-killed worker still
      # leaves a complete record in the log stream.  Required for the
      # observability pipeline documented in observability.md / C-15.
      PYTHONUNBUFFERED: "1"
    volumes:
      # Shared volume: app copies static files here for Nginx to serve.
      - static_files:/var/www/static
      # Writable per-app state (currently only the seed-complete
      # sentinel touched by entrypoint.sh after a successful first
      # run).  The volume is forward-compatible with the planned
      # Commit C-35 ``read_only: true`` rootfs hardening: even when
      # the rest of /home/shekel/app becomes immutable, this mount
      # remains writable so the sentinel survives container restarts.
      # The volume is internal -- nginx never reads it, so the path
      # cannot be served as a static asset.  See audit finding F-022.
      - shekel-prod-app-state:/home/shekel/app/state
    networks:
      - backend
    # Container logs rotate locally so the host disk cannot fill from
    # an unbounded log stream while still keeping a recent window
    # accessible via ``docker logs shekel-prod-app``.  The
    # authoritative long-term forensic record lives off-host in Loki
    # (Grafana Alloy reads this stream over the docker socket and
    # ships it to Loki on a separate container/network).  See audit
    # finding F-082 / F-150 / Commit C-15 for the architecture
    # decision; the matching collector lives in
    # ``/opt/docker/monitoring/`` per ``observability.md``.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3
    # Resource caps -- audit finding F-115 (Commit C-35).  Two
    # gunicorn workers plus the master is roughly 200-300 MiB resident
    # for this app's import surface (Flask, SQLAlchemy, Marshmallow,
    # cryptography, the budget service modules).  The 1 GiB limit
    # leaves comfortable headroom for transient spikes during 2-year
    # recurrence regeneration without crowding sibling containers on
    # the host; the reservation tells the daemon's OOM scorer to
    # prefer evicting other containers under host pressure.  pids
    # covers the master, both workers, and short-lived subprocesses
    # (psql/python in entrypoint.sh, healthcheck shells).  Migrated
    # 2026-05-14 from legacy mem_limit/pids_limit to the Compose-Spec
    # deploy.resources form.
    deploy:
      resources:
        limits: { cpus: '2', memory: 1G, pids: 200 }
        reservations: { cpus: '0.25', memory: 256M }
    # Container hardening -- audit findings F-055, F-056, F-117
    # (Commit C-35).  The Dockerfile already runs the gunicorn
    # process as the unprivileged ``shekel`` user, so capabilities
    # serve no purpose at runtime; cap_drop ALL closes the residual
    # surface a setuid binary in /opt/venv or apt-installed libpq
    # could expose under a future RCE.  no-new-privileges blocks any
    # such binary from elevating even within its own user.  The
    # rootfs becomes immutable so an attacker who lands code execution
    # in Gunicorn cannot persist a payload to /home/shekel/app or
    # /opt/venv -- restarting the container reverts to the
    # last-deployed image.  Writable surfaces:
    #   - /tmp:                              tmpfs (Python/cryptography temps)
    #   - /home/shekel/app/state:            named volume (seed sentinel)
    #   - /var/www/static:                   shared volume (entrypoint copies static files)
    # PYTHONDONTWRITEBYTECODE=1 above suppresses the __pycache__
    # write attempts that would otherwise log "permission denied" on
    # every module import.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  # ── Nginx Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: shekel-prod-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    # ``user: nginx`` lets nginx run with ``cap_drop: ALL`` (audit
    # findings F-055, F-056, F-117 / Commit C-35).  The nginx
    # alpine image's master process defaults to root and forks
    # workers under whatever the ``user`` directive says (default
    # ``nginx`` user from the upstream config we override).  The
    # privilege drop from root to nginx requires CAP_SETUID and
    # CAP_SETGID, which we cannot grant without re-introducing exactly
    # the surface this hardening is meant to remove.  Pinning the
    # whole process tree to the nginx user up-front sidesteps the
    # drop entirely and lets us run with zero capabilities.  The
    # paired changes that make this viable:
    #   - deploy/nginx-bundled/nginx.conf listens on 8080 (non-priv)
    #     so the master does not need CAP_NET_BIND_SERVICE.
    #   - deploy/nginx-bundled/nginx.conf writes ``pid /tmp/nginx.pid;``
    #     so the master can record its pid on the read-only rootfs's
    #     /tmp tmpfs (the default /run path is owned by root and not
    #     writable by the nginx user without CAP_DAC_OVERRIDE).
    user: nginx
    ports:
      # External access: host port 80 → Nginx port 8080.  The
      # external-facing port is unchanged; only the internal listen
      # port moved from 80 to 8080 so nginx (running as the
      # unprivileged ``nginx`` user) does not need
      # CAP_NET_BIND_SERVICE under cap_drop ALL.  Override the host
      # side with NGINX_PORT in .env if port 80 is already in use.
      - "${NGINX_PORT:-80}:8080"
    volumes:
      # Nginx configuration file (read-only).  This is the BUNDLED
      # config -- mounted only when shekel-prod-nginx actually runs.
      # In shared-mode deployments (deploy/docker-compose.prod.yml),
      # this service is parked in the "disabled" profile and the mount
      # is never realized.  The shared-mode equivalents live under
      # deploy/nginx-shared/.  See deploy/README.md for the mapping.
      - ./deploy/nginx-bundled/nginx.conf:/etc/nginx/nginx.conf:ro
      # Static files served directly by Nginx (populated by app).
      - static_files:/var/www/static:ro
    networks:
      - frontend
      - backend
    healthcheck:
      # Probes the internal listen port (8080) -- see the ``ports``
      # block above for why the internal port moved off 80.
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # Container logs rotate locally so the host disk cannot fill from
    # an unbounded access-log stream (audit finding F-116 / Commit
    # C-35).  Nginx access logs already stream to /dev/stdout via the
    # bundled config, so this controls the json-file driver buffer
    # under /var/lib/docker/containers/<id>.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Resource caps -- audit finding F-115 (Commit C-35).  Nginx is
    # tightly bounded; 128 MiB matches the operator standard in
    # /opt/docker/nginx and is generous for the static-file + reverse-
    # proxy workload of a single-user app.  pids accommodates the
    # master plus ``worker_processes auto`` (one per host CPU core,
    # capped at whatever the cgroup exposes).  Migrated 2026-05-14
    # from legacy mem_limit/pids_limit to the Compose-Spec
    # deploy.resources form.
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 128M, pids: 100 }
    # File-descriptor caps for the reverse-proxy event loop.  Nginx
    # holds one fd per active upstream connection plus epoll/eventfd
    # bookkeeping; the alpine image's 1024 soft cap is the leading
    # cause of "Too many open files" under burst load.  65535/65535
    # matches the operator standard in /opt/docker.
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # Container hardening -- audit findings F-055, F-056, F-117
    # (Commit C-35).  Nginx running as the unprivileged ``nginx``
    # user (see ``user:`` above) on a non-privileged listen port
    # needs zero Linux capabilities.  Read-only rootfs prevents
    # post-RCE persistence; the writable paths nginx actually
    # touches are exposed via tmpfs:
    #   - /tmp:                tmpfs (pid file, generic temp space)
    #   - /var/cache/nginx:    tmpfs (proxy/client_body temp dirs;
    #                          empty in steady state because
    #                          ``proxy_buffering off`` is set in
    #                          deploy/nginx-bundled/nginx.conf, but
    #                          nginx still requires the path to exist)
    #   - /var/run, /run:      tmpfs (the nginx alpine image's
    #                          docker-entrypoint.d scripts probe these)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
      - /run

volumes:
  # PostgreSQL data persistence.
  # EXTERNAL: must be created before first run with:
  #   docker volume create shekel-prod-pgdata
  # External volumes are NEVER deleted by "docker compose down -v".
  shekel-prod-pgdata:
    external: true
  # Static files shared between app and Nginx containers.
  static_files:
  # App-internal mutable state (writable on a read-only rootfs).
  # Currently holds only the seed-complete sentinel.  Compose
  # auto-creates this volume on first ``up`` -- not external because
  # losing the sentinel only causes the next start to re-run the
  # idempotent seed script.  Audit finding F-022 / Commit C-34.
  shekel-prod-app-state:

networks:
  # Frontend network: Nginx only.  Externally accessible via port mapping
  # on the host.  Subnet pinned to 172.30.0.0/24 so the bundled
  # nginx.conf can trust ``set_real_ip_from`` exactly to this CIDR,
  # rather than the historic loose "trust every RFC 1918 range".
  # Audit finding F-015, Commit C-33.
  frontend:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24
  # Backend network: all services.  Internal only -- not reachable from
  # host.  Subnet pinned to 172.31.0.0/24 so Gunicorn's
  # FORWARDED_ALLOW_IPS env var (set on the app service above) can be
  # a stable literal CIDR matching exactly the bridge that hosts the
  # in-stack nginx and the app.  Audit finding F-015, Commit C-33.
  backend:
    driver: bridge
    internal: true
    ipam:
      driver: default
      config:
        - subnet: 172.31.0.0/24
