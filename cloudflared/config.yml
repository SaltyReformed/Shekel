# Cloudflare Tunnel Configuration for Shekel Budget App
#
# Routes traffic from a Cloudflare subdomain through an encrypted
# tunnel to the local Nginx reverse proxy.  Cloudflare handles TLS
# termination; Nginx listens on plain HTTP.
#
# ── Prerequisites ────────────────────────────────────────────────
#   1. cloudflared installed on the Proxmox host
#   2. Authenticated:  cloudflared tunnel login
#   3. Tunnel created: cloudflared tunnel create shekel
#   4. DNS record:     cloudflared tunnel route dns shekel <DOMAIN>
#
# ── Setup ────────────────────────────────────────────────────────
#   1. Copy this file to the cloudflared config directory:
#        sudo mkdir -p /etc/cloudflared
#        sudo cp cloudflared/config.yml /etc/cloudflared/config.yml
#
#   2. Replace all <PLACEHOLDER> values with your actual values.
#
#   3. Test in the foreground first:
#        cloudflared tunnel --config /etc/cloudflared/config.yml run shekel
#
#   4. Install as a systemd service:
#        sudo cloudflared service install
#        sudo systemctl enable cloudflared
#        sudo systemctl start cloudflared
#
# ── Placeholder Reference ────────────────────────────────────────
#   <TUNNEL_ID>       -- UUID from `cloudflared tunnel create shekel`
#                       Find it with: cloudflared tunnel list
#   <DOMAIN>          -- Production subdomain (e.g., budget.example.com)
#   <STAGING_DOMAIN>  -- Staging subdomain for pre-production testing
#                       (e.g., staging-budget.example.com)
#   <TEAM_NAME>       -- Cloudflare Zero Trust team name (the
#                       subdomain at <TEAM>.cloudflareaccess.com).
#                       Find it under Zero Trust > Settings > Custom
#                       Pages or in the Access dashboard URL.
#   <AUD_TAG>         -- Audience (AUD) tag for the Access application
#                       protecting this tunnel.  Find it under Zero
#                       Trust > Access > Applications > <app> >
#                       Overview > Application Audience (AUD) Tag.
#                       64-character hex string.
#
# See docs/runbook.md for the full step-by-step setup procedure.

# ── Tunnel Identity ──────────────────────────────────────────────
# The tunnel UUID, assigned when the tunnel is created.
tunnel: <TUNNEL_ID>

# Path to the tunnel credentials JSON file.
# Created automatically by `cloudflared tunnel create`.
credentials-file: /root/.cloudflared/<TUNNEL_ID>.json

# ── Metrics Endpoint ─────────────────────────────────────────────
# Bind the cloudflared Prometheus metrics endpoint to loopback only.
# The default behaviour binds 0.0.0.0:2000 inside the container, which
# is reachable from every other peer on whatever Docker bridge
# cloudflared is attached to (homelab and shekel-frontend in the
# maintainer's deployment).  An attacker landing in any sibling
# container could poll /metrics for tunnel health, request counts,
# and connection state -- operational data that should not leak
# laterally even within the trusted homelab subnet.
#
# Pinning to 127.0.0.1 keeps the endpoint reachable only from inside
# the cloudflared container itself, where the operator's
# ``docker exec cloudflared wget -qO- http://127.0.0.1:2000/metrics``
# still works for ad-hoc inspection but no other container can
# probe it.  Audit finding F-128, Commit C-37.
metrics: 127.0.0.1:2000

# ── Ingress Rules ────────────────────────────────────────────────
# Ingress rules map hostnames to local services.  Rules are
# evaluated top-to-bottom; the first match wins.  A catch-all
# rule at the bottom is required by cloudflared.
#
# WAN-PATH SECURITY INVARIANT
# ---------------------------
# All public ingress MUST terminate at Nginx, never directly at
# Gunicorn.  Nginx is the single chokepoint that enforces:
#   - client_max_body_size (request size cap)
#   - timeouts (slowloris defenses)
#   - set_real_ip_from / real_ip_header (CF-Connecting-IP)
#   - the four defense-in-depth security headers (X-Frame-Options,
#     X-Content-Type-Options, Referrer-Policy, Permissions-Policy)
#   - per-request access logs in JSON
#
# Routing cloudflared straight to ``http://shekel-prod-app:8000``
# bypasses every one of those controls.  Audit finding F-063 called
# out exactly that gap on the maintainer's homelab; Commit C-33
# closed it.
ingress:
  # Production: route all traffic for the domain to Nginx.
  #
  # Bundled mode (this template):
  #   cloudflared runs as a systemd service on the host (or in a
  #   sidecar with ``network_mode: host``) and reaches the in-stack
  #   nginx via the host port mapping (``${NGINX_PORT:-80}:80`` in
  #   docker-compose.yml).  ``http://localhost:80`` is correct.
  #
  # Shared mode (operator's homelab):
  #   cloudflared runs as a Docker container on the
  #   ``shekel-frontend`` bridge and the shared /opt/docker/nginx
  #   container is also on that bridge.  Replace ``localhost:80``
  #   with ``nginx:80`` (Docker DNS resolves the service name).
  #   Example shared-mode rule:
  #
  #     - hostname: <DOMAIN>
  #       service: http://nginx:80
  #
  #   See deploy/docker-compose.prod.yml for the matching topology.
  #   Audit finding F-063, Commit C-33.
  - hostname: <DOMAIN>
    service: http://localhost:80
    originRequest:
      # Nginx listens on plain HTTP -- no TLS on the origin.
      # cloudflared and Nginx are colocated on loopback (bundled
      # mode) or on the dedicated shekel-frontend bridge (shared
      # mode), so the cleartext hop is bounded to a single trust
      # zone -- there is no path through which a network adversary
      # can intercept it.  Audit finding F-061 (bundled mode) /
      # F-063 (shared mode) / Commit C-33.
      noTLSVerify: true
      # ── Cloudflare Access policy (audit finding F-061 / C-37) ─
      # Require that every public request first authenticate
      # through Cloudflare Access (email-OTP minimum, identity
      # provider preferred).  Without this block, the only gate
      # between the public internet and Shekel is Flask's own
      # /login form -- a credential-stuffing surface that survives
      # rate-limit absorption because each unique IP gets a fresh
      # 5-per-15min window.
      #
      # The matching Access application is configured in the
      # Cloudflare Zero Trust dashboard:
      #   Zero Trust > Access > Applications > Add an application
      #   > Self-hosted > <DOMAIN>
      # under a policy that restricts the Allowed Users list to the
      # operator's email(s).  See docs/runbook.md §6.4 for the
      # dashboard procedure.
      #
      # The ``audTag`` (Application Audience tag) is a 64-character
      # hex string Cloudflare generates per Access application.
      # cloudflared validates the JWT in the
      # ``Cf-Access-Jwt-Assertion`` header against this AUD before
      # forwarding -- a request without a valid Access JWT is
      # rejected at the cloudflared edge before it ever reaches
      # Nginx.  Capture the tag from the Access application's
      # Overview tab and replace <AUD_TAG> below.
      access:
        required: true
        teamName: <TEAM_NAME>
        audTag:
          - <AUD_TAG>

  # Staging: uncomment during initial setup to test with a
  # separate subdomain before cutting over to production.
  # Remove or re-comment once production is verified.
  #
  # Create the DNS record first:
  #   cloudflared tunnel route dns shekel <STAGING_DOMAIN>
  #
  # - hostname: <STAGING_DOMAIN>
  #   service: http://localhost:80
  #   originRequest:
  #     noTLSVerify: true
  #     access:
  #       required: true
  #       teamName: <TEAM_NAME>
  #       audTag:
  #         - <STAGING_AUD_TAG>

  # Catch-all (required).  Returns 404 for requests that do not
  # match any hostname above.
  - service: http_status:404
