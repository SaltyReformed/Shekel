# Shekel Budget App -- Pytest Configuration

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show local variables in tracebacks.
# Performance tests are excluded by default; run them explicitly:
#   pytest tests/test_performance/ -v -s
#
# --dist=loadgroup makes the ``@pytest.mark.xdist_group("name")``
# marker actually serialise tagged tests onto a single worker.  No
# effect on single-process runs (``--dist`` is only consulted when
# pytest-xdist's ``-n`` flag is set); under ``-n 12`` (the default
# below) it ensures the ``shekel_app_role`` cluster-role tests
# (``tests/test_models/test_audit_migration.py::TestLeastPrivilegeRole``)
# do not race two workers on ``CREATE ROLE shekel_app`` /
# ``DROP ROLE shekel_app``.  Unmarked tests continue to load-balance
# across workers exactly as ``--dist=load`` would distribute them.
#
# -n 12 distributes tests across 12 pytest-xdist workers by default.
# Empirically (Phase 4.5 profiling on a 24-core host) -n 12 ran a
# 1,756-test batch in 79s vs 561s sequential -- a 7x speedup with
# ~59% scaling efficiency.  Going higher (-n 16, -n 24) keeps adding
# workers but the marginal gain falls off a cliff: PostgreSQL's
# cluster-wide WAL/fsync pipeline is the serialised resource, not
# CPU (24 cores idle during -n 16 runs).  -n 12 is the sweet spot
# where most of the parallelism win is captured without the thrash
# risk of saturating the WAL queue.  Override with ``-n 0`` for
# single-process debugging or ``-n auto`` for the absolute fastest
# run on a quiet box.
addopts = -v --tb=short --ignore=tests/test_performance --dist=loadgroup -n 12

# Per-test timeout (seconds). Prevents any single test from hanging.
# Slowest known test is ~3s (bcrypt MFA). 30s is a generous safety margin.
timeout = 30

# Custom marker registration.  Without this entry, pytest emits a
# PytestUnknownMarkWarning for every test carrying the marker, and a
# future ``--strict-markers`` flag would treat the marker as an
# error.  ``xdist_group`` is provided by pytest-xdist; ``slow_fixture``
# is project-local (defined here for opt-in exclusion from the
# fixture profile harness in
# ``docs/audits/test_improvements/test-performance-implementation-plan.md``).
markers =
    xdist_group(name): serialise all tests tagged with the same
        name onto a single pytest-xdist worker.  Required only for
        tests that mutate cluster-scoped PostgreSQL state (roles,
        replication slots, ...) which cannot be safely concurrent
        across the per-worker database clones.
    slow_fixture: mark a test whose own setup pays an above-normal
        cost (heavy seed data, expensive parametrisation) so the
        fixture profile harness can exclude it from per-step
        averages.  Reserved for future use; the Phase 0 harness
        currently treats every test equally and computes averages
        over the full sample.  See
        docs/audits/test_improvements/test-performance-implementation-plan.md.

# Filter deprecation warnings from dependencies.
filterwarnings =
    ignore::DeprecationWarning:flask_sqlalchemy.*
