# Shekel Budget App -- Pytest Configuration

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show local variables in tracebacks.
# Performance tests are excluded by default; run them explicitly:
#   pytest tests/test_performance/ -v -s
#
# --dist=loadgroup makes the ``@pytest.mark.xdist_group("name")``
# marker actually serialise tagged tests onto a single worker.  No
# effect on single-process runs (``--dist`` is only consulted when
# pytest-xdist's ``-n`` flag is set); under ``-n auto`` it ensures
# the ``shekel_app_role`` cluster-role tests
# (``tests/test_models/test_audit_migration.py::TestLeastPrivilegeRole``)
# do not race two workers on ``CREATE ROLE shekel_app`` /
# ``DROP ROLE shekel_app``.  Unmarked tests continue to load-balance
# across workers exactly as ``--dist=load`` would distribute them.
addopts = -v --tb=short --ignore=tests/test_performance --dist=loadgroup

# Per-test timeout (seconds). Prevents any single test from hanging.
# Slowest known test is ~3s (bcrypt MFA). 30s is a generous safety margin.
timeout = 30

# Custom marker registration.  Without this entry, pytest emits a
# PytestUnknownMarkWarning for every test carrying the marker, and a
# future ``--strict-markers`` flag would treat the marker as an
# error.  The marker itself is provided by pytest-xdist; we register
# it here so the test suite remains warning-clean.
markers =
    xdist_group(name): serialise all tests tagged with the same
        name onto a single pytest-xdist worker.  Required only for
        tests that mutate cluster-scoped PostgreSQL state (roles,
        replication slots, ...) which cannot be safely concurrent
        across the per-worker database clones.

# Filter deprecation warnings from dependencies.
filterwarnings =
    ignore::DeprecationWarning:flask_sqlalchemy.*
