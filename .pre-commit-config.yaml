# Local pre-commit hooks for Shekel. Install once with `pre-commit install`.
#
# These mirror the CI gate so a regression is caught before the commit lands,
# not at PR time. The Claude Code per-edit and Stop hooks are the in-session
# enforcement layer; this is the layer for commits made outside a Claude session.
#
# NOTE: in the Claude Code web/remote flow the container performs the commit, so
# pre-commit only fires there if a SessionStart hook runs `pre-commit install`.
# Its primary value is local developer commits; CI remains the enforced gate.
repos:
  - repo: local
    hooks:
      - id: pylint-app
        name: pylint app/ (custom checkers + design-smell floor)
        entry: pylint
        language: system
        types: [python]
        files: ^app/.*\.py$
        pass_filenames: false
        # Whole-package run: duplicate-code (R0801) is cross-file and cannot be
        # checked per-file. --fail-under=10 mirrors CI's lock-in floor
        # (docs/audits/pylint-cleanup/plan.md Phase 5; app/ is at a clean
        # 10.00/10). The shekel-* symbols are hard failures -- zero violations,
        # so this gives immediate protection for the financial-correctness rules.
        args:
          - app/
          - --fail-under=10
          - --fail-on=E,F,shekel-decimal-from-float,shekel-refname-compare,shekel-bare-money-quantize,shekel-disable-rationale
      - id: pylint-scripts
        name: pylint scripts/ (10.00/10 floor)
        entry: pylint
        language: system
        types: [python]
        files: ^scripts/.*\.py$
        pass_filenames: false
        # Mirrors ci.yml step 5a (added at the 2026-06-11 scripts/ lock-in).
        # Before this hook existed, a commit touching only scripts/*.py ran
        # zero local gates and failed only at PR time (polyglot audit
        # 2026-06-12, CI/PC-01 + HOOK/SH-09).
        args:
          - scripts/
          - --fail-under=10
          - --fail-on=E,F,shekel-decimal-from-float,shekel-refname-compare,shekel-bare-money-quantize,shekel-disable-rationale
      - id: pylint-cross-tree-duplicates
        name: cross-tree duplicate-code (app/ + scripts/)
        entry: pylint
        language: system
        types: [python]
        files: ^(app|scripts)/.*\.py$
        pass_filenames: false
        # Mirrors ci.yml step 5c: only a COMBINED run can see an app/ <->
        # scripts/ duplication cluster (each tree's own whole-package run is
        # blind across the boundary). Detection verified on the
        # pre-consolidation commit when the CI gate was added.
        args:
          - app/
          - scripts/
          - --disable=all
          - --enable=duplicate-code
          - --fail-on=duplicate-code
          - --score=no
      - id: pylint-tests-decimals
        name: shekel-decimal-from-float on tests/
        entry: pylint
        language: system
        types: [python]
        files: ^tests/.*\.py$
        pass_filenames: false
        # tests/ are out of general pylint scope, but a Decimal built from a
        # float in a hand-computed assertion is a real bug. unknown/bad-option-value
        # are disabled explicitly so the test files' "disable=X -- explanation"
        # inline comments do not derail this targeted scan (--disable=all does not
        # cover option-validity meta-messages).
        args:
          - tests/
          - --disable=all
          - --enable=shekel-decimal-from-float
          - --disable=unknown-option-value,bad-option-value
      - id: shekel-checker-tests
        name: pylint checker unit tests
        entry: pytest
        language: system
        files: ^tools/pylint/.*\.py$
        pass_filenames: false
        args: [tools/pylint/tests, -c, /dev/null, -q]
