# Local pre-commit hooks for Shekel. Install once with `pre-commit install`.
#
# These mirror the CI gate so a regression is caught before the commit lands,
# not at PR time. The Claude Code per-edit and Stop hooks are the in-session
# enforcement layer; this is the layer for commits made outside a Claude session.
#
# NOTE: in the Claude Code web/remote flow the container performs the commit, so
# pre-commit only fires there if a SessionStart hook runs `pre-commit install`.
# Its primary value is local developer commits; CI remains the enforced gate.
repos:
  - repo: local
    hooks:
      - id: pylint-app
        name: pylint app/ (custom checkers + design-smell floor)
        entry: pylint
        language: system
        types: [python]
        files: ^app/.*\.py$
        pass_filenames: false
        # Whole-package run: duplicate-code (R0801) is cross-file and cannot be
        # checked per-file. --fail-under=10 mirrors CI's lock-in floor
        # (docs/audits/pylint-cleanup/plan.md Phase 5; app/ is at a clean
        # 10.00/10). The shekel-* symbols are hard failures -- zero violations,
        # so this gives immediate protection for the financial-correctness rules.
        args:
          - app/
          - --fail-under=10
          - --fail-on=E,F,shekel-decimal-from-float,shekel-refname-compare,shekel-bare-money-quantize,shekel-disable-rationale
      - id: pylint-scripts
        name: pylint scripts/ (10.00/10 floor)
        entry: pylint
        language: system
        types: [python]
        files: ^scripts/.*\.py$
        pass_filenames: false
        # Mirrors ci.yml step 5a (added at the 2026-06-11 scripts/ lock-in).
        # Before this hook existed, a commit touching only scripts/*.py ran
        # zero local gates and failed only at PR time (polyglot audit
        # 2026-06-12, CI/PC-01 + HOOK/SH-09).
        args:
          - scripts/
          - --fail-under=10
          - --fail-on=E,F,shekel-decimal-from-float,shekel-refname-compare,shekel-bare-money-quantize,shekel-disable-rationale
      - id: pylint-cross-tree-duplicates
        name: cross-tree duplicate-code (app/ + scripts/)
        entry: pylint
        language: system
        types: [python]
        files: ^(app|scripts)/.*\.py$
        pass_filenames: false
        # Mirrors ci.yml step 5c: only a COMBINED run can see an app/ <->
        # scripts/ duplication cluster (each tree's own whole-package run is
        # blind across the boundary). Detection verified on the
        # pre-consolidation commit when the CI gate was added.
        args:
          - app/
          - scripts/
          - --disable=all
          - --enable=duplicate-code
          - --fail-on=duplicate-code
          - --score=no
      - id: pylint-tests-decimals
        name: shekel-decimal-from-float on tests/
        entry: pylint
        language: system
        types: [python]
        files: ^tests/.*\.py$
        pass_filenames: false
        # tests/ are out of general pylint scope, but a Decimal built from a
        # float in a hand-computed assertion is a real bug. unknown/bad-option-value
        # are disabled explicitly so the test files' "disable=X -- explanation"
        # inline comments do not derail this targeted scan (--disable=all does not
        # cover option-validity meta-messages).
        args:
          - tests/
          - --disable=all
          - --enable=shekel-decimal-from-float
          - --disable=unknown-option-value,bad-option-value
      - id: shekel-checker-tests
        name: pylint checker unit tests
        entry: pytest
        language: system
        files: ^tools/pylint/.*\.py$
        pass_filenames: false
        args: [tools/pylint/tests, -c, /dev/null, -q]

      # ── Polyglot-cleanup Phase 5 floors ─────────────────────────────
      # Non-Python linters adopted in docs/audits/polyglot-cleanup. Each
      # tool's config lives in its own file (.shellcheckrc, biome.jsonc,
      # .yamllint, .djlintrc, .gitleaks.toml, _typos.toml, .hadolint.yaml).
      # All run language:system, so they use the host binaries (shellcheck,
      # shfmt, biome, actionlint, typos, gitleaks, hadolint) and the venv
      # pip tools (yamllint, zizmor, djlint, rumdl). These mirror the ci.yml
      # polyglot-lint job; CI remains the enforced gate.
      - id: shellcheck
        name: shellcheck (shell; masked-errexit groups via .shellcheckrc)
        entry: shellcheck
        language: system
        types: [shell]
      - id: shfmt
        name: shfmt (shell format check)
        entry: shfmt -d -i 4 -ci -bn
        language: system
        types: [shell]
      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        types: [yaml]
      - id: actionlint
        name: actionlint (GitHub workflows)
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false
      - id: zizmor
        name: zizmor (workflow security)
        entry: zizmor --offline .github/workflows/
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false
      - id: biome
        name: biome lint (JS + CSS)
        entry: biome lint app/static/js app/static/css
        language: system
        files: ^app/static/(js|css)/.*\.(js|css)$
        pass_filenames: false
      - id: hadolint
        name: hadolint (Dockerfile)
        # hadolint is AUR-only (no pip/pacman package), so skip with a loud
        # notice if the host binary is absent rather than blocking every
        # local commit. The ci.yml polyglot-lint job installs a pinned
        # hadolint and hard-enforces it -- CI is the authoritative gate for
        # this surface (install locally with: yay -S hadolint-bin).
        entry: bash -c 'if command -v hadolint >/dev/null 2>&1; then hadolint "$@"; else echo "hadolint not installed (yay -S hadolint-bin) -- skipped locally; CI enforces."; fi' --
        language: system
        files: ^Dockerfile$
      - id: gitleaks
        name: gitleaks (committed-secret scan)
        entry: gitleaks dir . --no-banner --redact
        language: system
        pass_filenames: false
      - id: typos
        name: typos (content spell check)
        entry: typos
        language: system
        pass_filenames: false
      - id: djlint
        name: djlint (Jinja templates, lint-only)
        entry: djlint --lint
        language: system
        files: ^app/templates/.*\.html$
      - id: jinja-syntax
        name: jinja2 template parse check
        entry: python scripts/check_template_syntax.py
        language: system
        files: ^app/templates/.*\.html$
        pass_filenames: false
      - id: rumdl
        name: rumdl (Markdown lint + format check)
        # rumdl scans the whole tree honoring .rumdl.toml excludes, so it runs
        # unfiltered (pass_filenames: false); the files key just gates WHEN the
        # hook fires (any staged Markdown change).
        entry: rumdl check
        language: system
        files: \.md$
        pass_filenames: false
